<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Axolotl World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: auto; border: 2px solid #222; }
  #hud { color: #c8b89a; font-family: 'Courier New', monospace; font-size: 13px; background: #0f0d0b; width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; gap: 8px; }
  #jumpstate { color: #d4a855; font-weight: bold; flex: 1; text-align: center; }
  #zoom-wrap { display: flex; align-items: center; gap: 4px; }
  #zoom-wrap label { color: #a09080; white-space: nowrap; }
  #zoom-slider { width: 80px; accent-color: #c87840; }
  #zoom-val { color: #d4a855; width: 34px; text-align: right; }
  #hp-wrap { display: flex; align-items: center; gap: 3px; }
  .hrt { font-size: 18px; line-height: 1; transition: filter 0.1s; }
  .hrt.empty { filter: grayscale(1) brightness(0.35); }
  #homing-bar-wrap { display: none; align-items: center; gap: 5px; }
  #homing-bar-wrap label { color: #50dcff; font-size: 11px; letter-spacing: 1px; }
  #homing-bar-bg { width: 80px; height: 8px; background: #0a2a40; border: 1px solid #50dcff44; border-radius: 4px; overflow: hidden; }
  #homing-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #50dcff, #a0f0ff); border-radius: 4px; transition: width 0.1s; }

  /* Settings panel */
  #settings-btn { position: fixed; top: 8px; right: 8px; background: #333; color: #fff; border: 1px solid #666; font-family: monospace; font-size: 13px; padding: 4px 10px; cursor: pointer; z-index: 100; }
  #settings-btn:hover { background: #555; }
  #settings-panel {
    display: none; position: fixed; top: 36px; right: 8px; background: #1a1a1a;
    border: 2px solid #443322; color: #fff; font-family: monospace; font-size: 13px;
    padding: 14px 16px; z-index: 99; width: 290px; max-height: 80vh; overflow-y: auto;
  }
  #settings-panel.open { display: block; }
  #settings-panel h3 { color: #d4a855; margin-bottom: 10px; font-size: 14px; letter-spacing: 1px; }
  #settings-panel label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
  #settings-panel span.lbl { flex: 1; color: #a09080; }
  #settings-panel input[type=range] { flex: 1; accent-color: #c87840; }
  #settings-panel span.val { width: 44px; text-align: right; color: #d4a855; }
  #settings-panel button { margin-top: 10px; width: 100%; padding: 5px; background: #c84c0c; border: none; color: #fff; font-family: monospace; font-size: 13px; cursor: pointer; }
  #settings-panel button:hover { background: #e86020; }
  #settings-panel hr { border-color: #444; margin: 10px 0; }
  .key-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .key-row span { color: #a09080; flex: 1; }
  .key-btn { background: #222; border: 1px solid #554433; color: #d4a855; font-family: monospace; font-size: 12px; padding: 3px 8px; cursor: pointer; min-width: 90px; text-align: center; }
  .key-btn.listening { background: #2a1a10; border-color: #e85030; color: #e85030; animation: blink 0.6s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #gameover {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  }
  #gameover.show { display: flex; }
  #gameover h1 { color: #e83030; font-family: monospace; font-size: 52px; letter-spacing: 4px; text-shadow: 0 0 24px #c02020; }
  #gameover p  { color: #c8b89a; font-family: monospace; font-size: 20px; }
  #gameover button { background: #2a1a10; border: 2px solid #c87840; color: #d4a855; font-family: monospace; font-size: 22px; padding: 10px 36px; cursor: pointer; letter-spacing: 2px; }
  #gameover button:hover { background: #3a2416; }
  #title-screen {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  #title-screen video { width: 800px; height: 450px; object-fit: contain; display: block; }
  #press-enter {
    position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%);
    color: #fff; font-family: 'Courier New', monospace; font-size: 22px;
    letter-spacing: 4px; display: none;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="title-screen">
  <video id="intro-vid" autoplay playsinline src="assets/video/withintro_final.mov"></video>
  <div id="press-enter">PRESS ENTER TO START</div>
</div>
<div id="hud">
  <span>AXO <span id="score">000000</span></span>
  <div id="hp-wrap"></div>
  <div id="homing-bar-wrap">
    <label>HOME</label>
    <div id="homing-bar-bg"><div id="homing-bar-fill"></div></div>
    <span id="homing-bar-count" style="color:#50dcff;font-size:11px;min-width:14px;text-align:right;"></span>
  </div>
  <span id="medpack-hud" style="color:#00ffaa;font-size:12px;"></span>
  <span id="jumpstate">—</span>
  <span>GEMS <span id="coins">00</span></span>
  <div id="zoom-wrap">
    <label>ZOOM</label>
    <input type="range" id="zoom-slider" min="0.3" max="2.0" step="0.05" value="1.40">
    <span id="zoom-val">1.00x</span>
  </div>
  <select id="level-btn" style="background:#111;border:1px solid #446;color:#8af;font-family:monospace;font-size:12px;padding:3px 6px;cursor:pointer">
    <option value="0">LVL 1</option>
    <option value="1">LVL 2</option>
    <option value="2">LVL 3</option>
    <option value="3">LVL 4</option>
    <option value="4">LVL 5</option>
    <option value="5">LVL 6</option>
    <option value="6">LVL 7</option>
    <option value="7">LVL 8</option>
    <option value="8">LVL 9</option>
    <option value="9">LVL 10</option>
    <option value="10">LVL 11</option>
    <option value="12">BOSS: LEVIATHAN</option>
    <option value="13">BOSS: WRAITH</option>
    <option value="14">BOSS: WARDEN</option>
    <option value="15">TEST: ENEMY ROOM</option>
    <option value="16">LOOP THE LOOP</option>
  </select>
</div>
<canvas id="c" width="800" height="450"></canvas>

<div id="gameover">
  <h1>GAME OVER</h1>
  <p id="go-score"></p>
  <button id="go-restart">RESTART</button>
</div>

<button id="settings-btn">⚙ Settings</button>
<div id="settings-panel">
  <h3>⚙ SETTINGS</h3>

  <label><span class="lbl">Gravity (ground)</span>
    <input type="range" id="s-gravity" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity"></span>
  </label>
  <label><span class="lbl">Gravity (air)</span>
    <input type="range" id="s-gravity1" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity1"></span>
  </label>
  <label><span class="lbl">Jump height</span>
    <input type="range" id="s-jump1" min="0.5" max="25" step="0.1">
    <span class="val" id="v-jump1"></span>
  </label>
  <label><span class="lbl">Dash horiz (F)</span>
    <input type="range" id="s-dashH" min="4" max="60" step="0.5">
    <span class="val" id="v-dashH"></span>
  </label>
  <label><span class="lbl">Dash up (F+Up)</span>
    <input type="range" id="s-dashV" min="4" max="40" step="0.5">
    <span class="val" id="v-dashV"></span>
  </label>
  <label><span class="lbl">Dash length (frames)</span>
    <input type="range" id="s-dashLen" min="4" max="40" step="1">
    <span class="val" id="v-dashLen"></span>
  </label>
  <hr>

  <label><span class="lbl">Move speed</span>
    <input type="range" id="s-speed" min="1" max="20" step="0.5">
    <span class="val" id="v-speed"></span>
  </label>
  <label><span class="lbl">Axo size (px)</span>
    <input type="range" id="s-size" min="16" max="96" step="2">
    <span class="val" id="v-size"></span>
  </label>
  <label><span class="lbl">Enemy size (px)</span>
    <input type="range" id="s-enemySize" min="16" max="80" step="2">
    <span class="val" id="v-enemySize"></span>
  </label>
  <label><span class="lbl">Gnome size</span>
    <input type="range" id="s-gnomeScale" min="0.5" max="4" step="0.1">
    <span class="val" id="v-gnomeScale"></span>
  </label>
  <label><span class="lbl">Ultra dash speed</span>
    <input type="range" id="s-dashFrenzyMult" min="0.3" max="1.5" step="0.05">
    <span class="val" id="v-dashFrenzyMult"></span>
  </label>
  <label><span class="lbl">Homing chain</span>
    <input type="range" id="s-homingChain" min="1" max="10" step="1">
    <span class="val" id="v-homingChain"></span>
  </label>
  <label><span class="lbl">Dash count</span>
    <input type="range" id="s-dashCount" min="1" max="10" step="1">
    <span class="val" id="v-dashCount"></span>
  </label>
  <label><span class="lbl">Dash chain</span>
    <input type="range" id="s-dashChain" min="1" max="10" step="1">
    <span class="val" id="v-dashChain"></span>
  </label>
  <label><span class="lbl">Stomp kill</span>
    <input type="range" id="s-stompKill" min="0" max="1" step="1">
    <span class="val" id="v-stompKill"></span>
  </label>
  <label><span class="lbl">Bat size</span>
    <input type="range" id="s-batScale" min="0.5" max="4" step="0.1">
    <span class="val" id="v-batScale"></span>
  </label>
  <label><span class="lbl">Sprite smoothing</span>
    <input type="range" id="s-smoothing" min="0" max="1" step="1">
    <span class="val" id="v-smoothing"></span>
  </label>
  <label><span class="lbl">Sprite rotation (°)</span>
    <input type="range" id="s-spriteRot" min="-45" max="45" step="1">
    <span class="val" id="v-spriteRot"></span>
  </label>
  <label><span class="lbl">Ground offset (px)</span>
    <input type="range" id="s-spriteOffset" min="-20" max="20" step="1">
    <span class="val" id="v-spriteOffset"></span>
  </label>
  <label><span class="lbl">Jump sprite size</span>
    <input type="range" id="s-jumpScale" min="0.3" max="4.0" step="0.05">
    <span class="val" id="v-jumpScale"></span>
  </label>
  <label><span class="lbl">Dive sprite size</span>
    <input type="range" id="s-diveScale" min="0.3" max="3.0" step="0.05">
    <span class="val" id="v-diveScale"></span>
  </label>
  <label><span class="lbl">Jump sprite offset</span>
    <input type="range" id="s-jumpSpriteOffset" min="-80" max="80" step="1">
    <span class="val" id="v-jumpSpriteOffset"></span>
  </label>
  <label><span class="lbl">Land sprite offset</span>
    <input type="range" id="s-landSpriteOffset" min="-80" max="80" step="1">
    <span class="val" id="v-landSpriteOffset"></span>
  </label>
  <label><span class="lbl">Ball size (px)</span>
    <input type="range" id="s-ballSize" min="20" max="120" step="2">
    <span class="val" id="v-ballSize"></span>
  </label>

  <hr>
  <h3 style="margin-bottom:8px">⌨ KEY BINDINGS</h3>
  <div class="key-row"><span>Move Left</span>   <button class="key-btn" data-action="left"></button></div>
  <div class="key-row"><span>Move Right</span>  <button class="key-btn" data-action="right"></button></div>
  <div class="key-row"><span>Jump / Homing</span><button class="key-btn" data-action="jump"></button></div>
  <div class="key-row"><span>Up (aim / dash)</span><button class="key-btn" data-action="up"></button></div>
  <div class="key-row"><span>Dash</span>        <button class="key-btn" data-action="dash"></button></div>
  <div class="key-row"><span>Slam (down dash)</span><button class="key-btn" data-action="down"></button></div>
  <button id="s-reset-keys" style="background:#2a1a10;margin-bottom:6px">Reset keys</button>
  <hr>

  <hr>
  <label><span class="lbl">Level theme</span>
    <select id="s-theme" style="background:#111;color:#ccc;border:1px solid #444;font-family:monospace;font-size:12px;padding:2px 4px;width:100%">
      <option value="city">City Night</option>
      <option value="forest">Forest</option>
      <option value="happy">Happy Hills</option>
      <option value="ice">Ice Cave</option>
      <option value="woods">Woods</option>
    </select>
  </label>
  <button id="s-reset">Reset defaults</button>
  <button id="s-export-cfg" style="background:#1a2a10;border:1px solid #4a8a20;color:#afa;margin-top:6px">⬇ Export .cfg</button>
  <hr>
  <h3 style="margin-bottom:8px">🛠 CODER</h3>
  <button id="s-give-token">+ Give Token</button>
  <label style="margin-top:8px"><span class="lbl">Invincible</span>
    <input type="range" id="s-godMode" min="0" max="1" step="1">
    <span class="val" id="v-godMode"></span>
  </label>
</div>

<script src="js/config.js?v=1781638877"></script>
<script src="js/enemies.js?v=1781638877"></script>
<script src="js/tutorial.js?v=1781638877"></script>
<script src="js/update.js?v=1781638877"></script>
<script src="js/draw.js?v=1781638877"></script>
<script src="js/main.js?v=1781638877"></script>
</body>
</html>
