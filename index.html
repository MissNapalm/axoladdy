<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axolotl World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; border: 2px solid #222; }
  #hud { color: #c8b89a; font-family: 'Courier New', monospace; font-size: 13px; background: #0f0d0b; width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; gap: 8px; }
  #jumpstate { color: #d4a855; font-weight: bold; flex: 1; text-align: center; }
  #zoom-wrap { display: flex; align-items: center; gap: 4px; }
  #zoom-wrap label { color: #a09080; white-space: nowrap; }
  #zoom-slider { width: 80px; accent-color: #c87840; }
  #zoom-val { color: #d4a855; width: 34px; text-align: right; }
  #hp-wrap { display: flex; align-items: center; gap: 3px; }
  .hrt { font-size: 18px; line-height: 1; transition: filter 0.1s; }
  .hrt.empty { filter: grayscale(1) brightness(0.35); }

  /* Settings panel */
  #settings-btn { position: fixed; top: 8px; right: 8px; background: #333; color: #fff; border: 1px solid #666; font-family: monospace; font-size: 13px; padding: 4px 10px; cursor: pointer; z-index: 100; }
  #settings-btn:hover { background: #555; }
  #settings-panel {
    display: none; position: fixed; top: 36px; right: 8px; background: #1a1a1a;
    border: 2px solid #443322; color: #fff; font-family: monospace; font-size: 13px;
    padding: 14px 16px; z-index: 99; width: 290px; max-height: 80vh; overflow-y: auto;
  }
  #settings-panel.open { display: block; }
  #settings-panel h3 { color: #d4a855; margin-bottom: 10px; font-size: 14px; letter-spacing: 1px; }
  #settings-panel label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
  #settings-panel span.lbl { flex: 1; color: #a09080; }
  #settings-panel input[type=range] { flex: 1; accent-color: #c87840; }
  #settings-panel span.val { width: 44px; text-align: right; color: #d4a855; }
  #settings-panel button { margin-top: 10px; width: 100%; padding: 5px; background: #c84c0c; border: none; color: #fff; font-family: monospace; font-size: 13px; cursor: pointer; }
  #settings-panel button:hover { background: #e86020; }
  #settings-panel hr { border-color: #444; margin: 10px 0; }
  .key-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .key-row span { color: #a09080; flex: 1; }
  .key-btn { background: #222; border: 1px solid #554433; color: #d4a855; font-family: monospace; font-size: 12px; padding: 3px 8px; cursor: pointer; min-width: 90px; text-align: center; }
  .key-btn.listening { background: #2a1a10; border-color: #e85030; color: #e85030; animation: blink 0.6s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #gameover {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  }
  #gameover.show { display: flex; }
  #gameover h1 { color: #e83030; font-family: monospace; font-size: 52px; letter-spacing: 4px; text-shadow: 0 0 24px #c02020; }
  #gameover p  { color: #c8b89a; font-family: monospace; font-size: 20px; }
  #gameover button { background: #2a1a10; border: 2px solid #c87840; color: #d4a855; font-family: monospace; font-size: 22px; padding: 10px 36px; cursor: pointer; letter-spacing: 2px; }
  #gameover button:hover { background: #3a2416; }
</style>
</head>
<body>
<div id="hud">
  <span>AXO <span id="score">000000</span></span>
  <div id="hp-wrap"></div>
  <span id="jumpstate">—</span>
  <span>ORBS <span id="coins">00</span></span>
  <div id="zoom-wrap">
    <label>ZOOM</label>
    <input type="range" id="zoom-slider" min="0.3" max="2.0" step="0.05" value="1">
    <span id="zoom-val">1.00x</span>
  </div>
</div>
<canvas id="c" width="800" height="450"></canvas>

<div id="gameover">
  <h1>GAME OVER</h1>
  <p id="go-score"></p>
  <button id="go-restart">RESTART</button>
</div>

<button id="settings-btn">⚙ Settings</button>
<div id="settings-panel">
  <h3>⚙ SETTINGS</h3>

  <label><span class="lbl">Gravity (ground)</span>
    <input type="range" id="s-gravity" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity"></span>
  </label>
  <label><span class="lbl">Gravity (air)</span>
    <input type="range" id="s-gravity1" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity1"></span>
  </label>
  <label><span class="lbl">Jump height</span>
    <input type="range" id="s-jump1" min="0.5" max="25" step="0.1">
    <span class="val" id="v-jump1"></span>
  </label>
  <label><span class="lbl">Dash horiz (F)</span>
    <input type="range" id="s-dashH" min="4" max="60" step="0.5">
    <span class="val" id="v-dashH"></span>
  </label>
  <label><span class="lbl">Dash up (F+Up)</span>
    <input type="range" id="s-dashV" min="4" max="40" step="0.5">
    <span class="val" id="v-dashV"></span>
  </label>
  <label><span class="lbl">Dash length (frames)</span>
    <input type="range" id="s-dashLen" min="4" max="40" step="1">
    <span class="val" id="v-dashLen"></span>
  </label>
  <hr>

  <label><span class="lbl">Move speed</span>
    <input type="range" id="s-speed" min="1" max="20" step="0.5">
    <span class="val" id="v-speed"></span>
  </label>
  <label><span class="lbl">Axo size (px)</span>
    <input type="range" id="s-size" min="16" max="96" step="2">
    <span class="val" id="v-size"></span>
  </label>

  <hr>
  <h3 style="margin-bottom:8px">⌨ KEY BINDINGS</h3>
  <div class="key-row"><span>Move Left</span>   <button class="key-btn" data-action="left"></button></div>
  <div class="key-row"><span>Move Right</span>  <button class="key-btn" data-action="right"></button></div>
  <div class="key-row"><span>Jump / Homing</span><button class="key-btn" data-action="jump"></button></div>
  <div class="key-row"><span>Up (aim)</span>    <button class="key-btn" data-action="up"></button></div>
  <div class="key-row"><span>Dash</span>        <button class="key-btn" data-action="dash"></button></div>
  <button id="s-reset-keys" style="background:#2a1a10;margin-bottom:6px">Reset keys</button>
  <hr>

  <button id="s-reset">Reset defaults</button>
</div>

// ── Solids ────────────────────────────────────────────────────────────────────
function buildSolids() {
  const solids = [];
  for (let tx = 0; tx < LEVEL_W_TILES; tx++) {
    if (groundInGap(tx)) continue;
    for (let ty = groundY; ty <= groundY + 2; ty++)
      solids.push({ x: tx * TILE, y: ty * TILE, w: TILE, h: TILE, type: 'ground', tx, ty });
  }
  for (const p of platforms) {
    for (let i = 0; i < p.w; i++) {
      const tx = p.x + i, key = `${tx}_${p.y}`;
      solids.push({ x: tx * TILE, y: p.y * TILE, w: TILE, h: TILE, type: p.t, tx, ty: p.y, key });
    }
  }
  for (const pipe of pipes) {
    for (let j = 0; j < pipe.h; j++) {
      const ty = groundY - j;
      solids.push({ x: pipe.x * TILE, y: ty * TILE, w: TILE * 2, h: TILE, type: j === 0 ? 'pipetop' : 'pipe', tx: pipe.x, ty });
    }
  }
  return solids;
}
const solids = buildSolids();

function getSolidsNear(px, py, pw, ph) {
  return solids.filter(s => s.x < px + pw + 96 && s.x + s.w > px - 96 && s.y < py + ph + 96 && s.y + s.h > py - 96);
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── HUD elements ─────────────────────────────────────────────────────────────
const jumpEl  = document.getElementById('jumpstate');
const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coins');

function jumpLabel() {
  if (player.wonSlide)  return '★ YOU WIN ★';
  if (player.dead)      return '✕ DEAD ✕';
  if (player.homing)    return '>> HOMING! <<';
  if (player.onGround)  return '— READY —';
  if (!player.onGround) return 'SPACE: HOMING';
  return '— READY —';
}

function updateHUD() {
  scoreEl.textContent = String(score).padStart(6, '0');
  coinsEl.textContent = String(coinCount).padStart(2, '0');
  jumpEl.textContent  = jumpLabel();
}

// ── Particles ────────────────────────────────────────────────────────────────
const coinParticles = [];
const dustParticles = [];
const trailParticles = [];
const spindashParticles = [];
const explosionParticles = [];

function spawnCoinPop(x, y) {
  coinParticles.push({ x, y, vy: -6, life: 40, maxLife: 40 });
  coinCount++;
  coinsEl.textContent = String(coinCount).padStart(2, '0');
}

function spawnDust(x, y, count = 6) {
  for (let i = 0; i < count; i++) {
    dustParticles.push({
      x: x + (Math.random() - 0.5) * 24,
      y,
      vx: (Math.random() - 0.5) * 3,
      vy: -(Math.random() * 2 + 0.3),
      r: Math.random() * 5 + 3,
      life: 20 + Math.floor(Math.random() * 14),
      maxLife: 34,
    });
  }
}

function spawnTrail(x, y) {
  trailParticles.push({
    x, y,
    r: Math.random() * 6 + 4,
    life: 20 + Math.floor(Math.random() * 8),
    maxLife: 28,
    hue: Math.random() * 60 + 180,
  });
}

function spawnDashTrail(x, y) {
  trailParticles.push({
    x: x + (Math.random() - 0.5) * 10,
    y: y + (Math.random() - 0.5) * 10,
    r: Math.random() * 10 + 8,
    life: 12 + Math.floor(Math.random() * 6),
    maxLife: 18,
    hue: 180 + Math.random() * 60,
    bright: true,
  });
}


function damageEnemy(g, dmg) {
  if (g.dead) return false;
  g.hp -= dmg;
  if (g.hp <= 0) {
    g.dead = true; g.deadTimer = 40;
    score += g.flying ? 200 : 100; updateHUD();
    spawnExplosion(g.x + g.w / 2, g.y + g.h / 2, g.flying);
    return true; // killed
  }
  g.hitFlash = 18; // stagger flash
  return false; // hurt but alive
}

function spawnExplosion(x, y, flying) {
  const hue = flying ? 280 : 140;
  for (let i = 0; i < 24; i++) {
    const angle = (Math.PI * 2 * i / 24) + Math.random() * 0.3;
    const speed = 2.5 + Math.random() * 5;
    explosionParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      r: 2 + Math.random() * 5,
      life: 28 + Math.floor(Math.random() * 22),
      maxLife: 50,
      hue: hue + (Math.random() - 0.5) * 40,
    });
  }
  // bright flash blob
  explosionParticles.push({ x, y, vx:0, vy:0, r:18, life:6, maxLife:6, hue: flying?300:60, flash:true });
}

function updateHPBar() {
  const wrap = document.getElementById('hp-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < MAX_HP; i++) {
    const s = document.createElement('span');
    s.className = 'hrt' + (i < hp ? '' : ' empty');
    s.textContent = '❤';
    wrap.appendChild(s);
  }
}

function spawnSpindash(x, y, dir) {
  for (let i = 0; i < 3; i++) {
    spindashParticles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      vx: -dir * (Math.random() * 4 + 2),
      vy: (Math.random() - 0.5) * 2,
      r: Math.random() * 4 + 2,
      life: 16 + Math.floor(Math.random() * 10),
      maxLife: 26,
    });
  }
}

// ── Physics ───────────────────────────────────────────────────────────────────
const HOMING_RANGE = 300; // px
const HOMING_SPEED = 14;

let prevJumpKey = false;
let prevUpKey   = false;
let prevEKey = false;

function nearestLiveGoomba() {
  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  let best = null, bestDist = Infinity;
  for (const g of [...goombas, ...flyers]) {
    if (g.dead) continue;
    const gx = g.x + g.w / 2, gy = g.y + g.h / 2;
    const dist = Math.hypot(px - gx, py - gy);
    if (dist < HOMING_RANGE && dist < bestDist) { best = g; bestDist = dist; }
  }
  return best;
}

function update(dt) {
  if (won && !player.wonSlide) return;
  if (dead) return;

  player.w = CFG.axoSize;
  player.h = CFG.axoSize;
  if (player.invincible > 0) player.invincible--;

  const now = performance.now();
  const goLeft  = keys[KEYS.left]  || false;
  const goRight = keys[KEYS.right] || false;
  // Edge-detect only on the dedicated jump key; Up key also triggers jump but only on fresh press
  const jumpKey = keys[KEYS.jump] || false;
  const upKey   = keys[KEYS.up]   || false;
  const jumpJustPressed = (jumpKey && !prevJumpKey) || (upKey && !prevUpKey);
  prevJumpKey = jumpKey;
  prevUpKey   = upKey;

  const eKey = keys[KEYS.dash] || false;
  const eJustPressed = eKey && !prevEKey;
  prevEKey = eKey;

  if (player.wonSlide) {
    player.vy = 2.5; player.vx = 0;
    player.y += player.vy;
    if (player.y + player.h >= groundY * TILE) player.y = groundY * TILE - player.h;
    camera += (Math.min(player.x - W / 3, LEVEL_W_TILES * TILE - W) - camera) * CAM_EASE;
    return;
  }

  // Space/jump while airborne — homing attack if enemy nearby
  if (jumpJustPressed && !player.onGround && !player.homing) {
    const target = nearestLiveGoomba();
    if (target) {
      player.homing = true;
      player.homingTarget = target;
      player.homingUsed = true;
      player.spinning = true;
      target.lockFlash = 10;
    }
  }

  // F — directional dash, tracked per direction
  if (eJustPressed && !player.homing) {
    const goingUp = keys[KEYS.up] || false;
    const horizDir = goLeft ? -1 : goRight ? 1 : player.dir;
    const wantH = goLeft || goRight || (!goingUp);
    const wantUp = goingUp;
    const canUp = wantUp && !player.dashUsedUp;
    const canH  = wantH  && !player.dashUsedH;

    if (wantUp && wantH && (canUp || canH)) {
      // diagonal — only allowed if both directions still available
      if (canUp && canH) {
        const diagH = CFG.dashH * 0.707;
        const diagV = CFG.dashV * 0.707;
        player.vx = horizDir * diagH;
        player.vy = -diagV;
        player.dashUsedUp = true;
        player.dashUsedH  = true;
        player.dashFrames = CFG.dashLen;
        player.spinning = false;
      }
    } else if (wantUp && canUp) {
      player.vx = 0;
      player.vy = -CFG.dashV;
      player.dashUsedUp = true;
      player.dashFrames = CFG.dashLen;
      player.spinning = false;
    } else if (canH) {
      player.vx = horizDir * CFG.dashH;
      player.vy = 0;
      player.dashUsedH = true;
      player.dashFrames = CFG.dashLen;
      player.spinning = false;
    }
  }

  // Tick dash frames and spawn afterimage trail
  if (player.dashFrames > 0) {
    player.dashFrames--;
    // dense afterimage trail — two per frame
    spawnDashTrail(player.x + player.w / 2, player.y + player.h / 2);
    spawnDashTrail(player.x + player.w / 2, player.y + player.h / 2);
  }

  // Drive homing movement
  if (player.homing && player.homingTarget) {
    const tg = player.homingTarget;
    if (tg.dead) {
      player.homing = false; player.homingTarget = null;
    } else {
      const tx = tg.x + tg.w / 2, ty = tg.y + tg.h / 2;
      const px = player.x + player.w / 2, py = player.y + player.h / 2;
      const dx = tx - px, dy = ty - py;
      const dist = Math.hypot(dx, dy);
      if (dist < 12) {
        const killed = damageEnemy(tg, 1);
        if (killed) { comboCount++; comboTimer = 120; }
        player.homing = false; player.homingTarget = null;
        player.vy = -CFG.jump1 * 1.3;
        player.vx = player.dir * CFG.moveSpeed * 2.5;
        player.spinning = false;
        player.homingUsed = false;
        player.dashUsedUp = false; player.dashUsedH = false;
      } else {
        player.vx = (dx / dist) * HOMING_SPEED;
        player.vy = (dy / dist) * HOMING_SPEED;
        if (player.vx > 0) player.dir = 1;
        else if (player.vx < 0) player.dir = -1;
        spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
      }
    }
  }

  // Normal movement (not homing, not dashing)
  if (!player.homing && player.dashFrames <= 0) {
    if (goRight) { player.vx = CFG.moveSpeed; player.dir = 1; }
    else if (goLeft) { player.vx = -CFG.moveSpeed; player.dir = -1; }
    else player.vx *= 0.75;
  }

  // Jump from ground only
  if (jumpJustPressed && player.onGround) {
    player.vy = -CFG.jump1;
    player.onGround = false;
    player.homingUsed = false;
  }

  // Spin during homing or after a dash
  if (player.spinning || player.homing) {
    player.spinAngle += player.homing ? 28 : 18;
    if (Math.random() < 0.5) spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
  }

  // Gravity (suppressed during homing and active dash frames)
  if (!player.homing && player.dashFrames <= 0) {
    const g = player.onGround ? CFG.gravity : CFG.gravity1;
    player.vy += g;
    if (player.vy > 20) player.vy = 20;
  }

  // Move X
  player.x += player.vx;
  player.x = Math.max(0, player.x);

  // Collide X
  const nearX = getSolidsNear(player.x, player.y, player.w, player.h);
  for (const s of nearX) {
    if (rectsOverlap({ x: player.x, y: player.y + 2, w: player.w, h: player.h - 4 }, s)) {
      if (player.vx > 0) player.x = s.x - player.w;
      else if (player.vx < 0) player.x = s.x + s.w;
      player.vx = 0;
      if (player.homing) { player.homing = false; player.homingTarget = null; }
    }
  }

  // Move Y
  const wasOnGround = player.onGround;
  player.onGround = false;
  player.y += player.vy;

  const nearY = getSolidsNear(player.x, player.y, player.w, player.h);
  for (const s of nearY) {
    if (rectsOverlap({ x: player.x + 2, y: player.y, w: player.w - 4, h: player.h }, s)) {
      if (player.vy > 0) {
        player.y = s.y - player.h;
        player.vy = 0;
        if (!wasOnGround) {
          player.lastLandTime = now;
          spawnDust(player.x + player.w / 2, player.y + player.h);
          player.spinning = false;
          player.homing = false; player.homingTarget = null;
          player.dashFrames = 0;
          comboCount = 0; comboTimer = 0;
        }
        player.onGround = true;
        player.homingUsed = false;
        player.dashUsedUp = false; player.dashUsedH = false;
      } else if (player.vy < 0) {
        player.y = s.y + s.h;
        player.vy = 1;
        hitBlock(s);
        if (player.homing) { player.homing = false; player.homingTarget = null; }
      }
    }
  }

  // Pit death
  if (player.y > H + 200) { killPlayer(); return; }

  // Coins
  for (const coin of coins) {
    if (coin.collected) continue;
    coin.bobTimer += 0.05;
    if (rectsOverlap({ x: coin.x + 4, y: coin.y + 4, w: TILE - 8, h: TILE - 8 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
      coin.collected = true; coinCount++; score += 200; updateHUD();
    }
  }

  // Ground enemies + flyers — unified update
  const allEnemies = [...goombas, ...flyers];
  for (const g of allEnemies) {
    if (g.dead) { g.deadTimer--; if (g.lockFlash) g.lockFlash--; continue; }
    if (g.lockFlash) g.lockFlash--;
    g.x += g.vx;
    if (g.x <= g.pl || g.x + g.w >= g.pr) g.vx *= -1;
    g.frame += 0.08;
    if (g.flying) {
      g.wobble += 0.04;
      g.y = g.baseY + Math.sin(g.wobble) * 18;
    }

    // Shoot at player if within range and cooldown elapsed
    if (!g.shootCooldown) g.shootCooldown = 180 + Math.floor(Math.random() * 120);
    g.shootCooldown--;
    if (g.shootCooldown <= 0) {
      const dx = (player.x + player.w / 2) - (g.x + g.w / 2);
      const dy = (player.y + player.h / 2) - (g.y + g.h / 2);
      const dist = Math.hypot(dx, dy);
      if (dist < 380) {
        if (g.flying) {
          // Three projectiles: aimed + two spread
          const spd = 4.5;
          const ang = Math.atan2(dy, dx);
          for (const spread of [-0.25, 0, 0.25]) {
            projectiles.push({ x: g.x + g.w/2, y: g.y + g.h/2,
              vx: Math.cos(ang + spread) * spd, vy: Math.sin(ang + spread) * spd,
              life: 130, flying: true });
          }
        } else {
          const spd = 2.2;
          projectiles.push({ x: g.x + g.w/2, y: g.y + g.h/2, vx: (dx/dist)*spd, vy: (dy/dist)*spd, life: 160, flying: false });
        }
      }
      g.shootCooldown = g.flying
        ? 180 + Math.floor(Math.random() * 120)
        : 240 + Math.floor(Math.random() * 160);
    }

    if (g.hitFlash > 0) g.hitFlash--;
    const gr = { x: g.x + 2, y: g.y + 2, w: g.w - 4, h: g.h - 4 };
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectsOverlap(gr, pr)) {
      if (player.dashFrames > 0 && !g.hitFlash) {
        damageEnemy(g, 1);
        g.hitFlash = Math.max(g.hitFlash, 20);
        // Bounce player back opposite dash direction
        player.vx = -Math.sign(player.vx) * 8;
        player.vy = -6;
        player.dashFrames = 0;
        player.onGround = false;
      } else if (player.spinning || (!g.flying && player.vy > 0 && player.y + player.h < g.y + g.h / 2 + 10)) {
        damageEnemy(g, g.hp); // instant kill on stomp/spin
        player.vy = Math.min(player.vy, -6);
      } else if (!player.homing && !player.dashFrames && player.invincible === 0) {
        hp--;
        updateHPBar();
        player.invincible = 80;
        if (hp <= 0) { killPlayer(); return; }
      }
    }
  }

  // Projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    if (rectsOverlap({ x: p.x - 5, y: p.y - 5, w: 10, h: 10 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
      projectiles.splice(i, 1);
      if (player.invincible === 0) {
        hp--;
        updateHPBar();
        // Knockback away from projectile direction
        player.vx = (p.vx > 0 ? 1 : -1) * 9;
        player.vy = -7;
        player.onGround = false;
        player.invincible = 80;
        if (hp <= 0) { killPlayer(); return; }
      }
    }
  }


  // Flag
  if (player.x + player.w > FLAG_X * TILE && !won) {
    won = true; player.wonSlide = true;
    player.x = FLAG_X * TILE - player.w + 6; player.vx = 0;
    score += 1000; updateHUD();
  }

  // Camera X — keep player horizontally centered at all zoom levels
  const targetCam = player.x + player.w / 2 - W / 2;
  camera += (Math.min(Math.max(targetCam, 0), LEVEL_W_TILES * TILE - W) - camera) * CAM_EASE;

  // Camera Y — keep player vertically centered at all zoom levels
  const targetCamY = player.y + player.h / 2 - H / 2;
  cameraY += (Math.min(Math.max(targetCamY, groundY * TILE - H), 0) - cameraY) * CAM_EASE;

  if (comboTimer > 0) comboTimer--;
  updateHUD();
}

function hitBlock(s) {
  if (!s.key || blockHit[s.key]) return;
  blockHit[s.key] = true;
  if (s.type === 'qblock') { score += 200; }
  else if (s.type === 'brick') score += 50;
  else if (s.type === 'hblock') { hp = Math.min(MAX_HP, hp + 1); updateHPBar(); }
  updateHUD();
}

function killPlayer() {
  if (dead) return;
  dead = true; player.dead = true; player.vy = -12; player.vx = 0;
  setTimeout(() => {
    document.getElementById('go-score').textContent = 'Score: ' + String(score).padStart(6, '0');
    document.getElementById('gameover').classList.add('show');
  }, 1200);
}

document.getElementById('go-restart').addEventListener('click', () => location.reload());
document.addEventListener('keydown', e => { if ((e.code === 'KeyR' || e.code === 'Enter') && dead) location.reload(); });

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawBg() {
  const t = performance.now() / 3000;
  // Distant mountains / alien spires
  for (let i = 0; i < 28; i++) {
    const bx = (i * 340 + 60) - camera * 0.18;
    const by = 420 + cameraY * 0.06;
    const bw = 60 + (i % 4) * 30;
    const bh = 80 + (i % 5) * 40;
    ctx.fillStyle = i % 3 === 0 ? '#1a1030' : '#13102a';
    ctx.beginPath();
    ctx.moveTo(bx - bw, by);
    ctx.lineTo(bx, by - bh);
    ctx.lineTo(bx + bw, by);
    ctx.fill();
    // Glowing tip
    ctx.fillStyle = `hsla(${270 + i * 13}, 70%, 55%, 0.3)`;
    ctx.beginPath(); ctx.arc(bx, by - bh + 4, 4, 0, Math.PI*2); ctx.fill();
  }
  // Nebula wisps
  for (let i = 0; i < 20; i++) {
    const nx = (i * 520 + 100) - camera * 0.3;
    const ny = 40 + (i % 5) * 30 + cameraY * 0.12;
    ctx.globalAlpha = 0.07 + 0.04 * Math.sin(t + i);
    ctx.fillStyle = `hsl(${260 + i * 20}, 80%, 60%)`;
    ctx.beginPath(); ctx.ellipse(nx, ny, 80 + i * 10, 18 + i % 5 * 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Stars (fixed to bg layer)
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 397 + 50) % (LEVEL_W_TILES * TILE)) - camera * 0.05;
    const sy = 10 + (i * 137 % 280) + cameraY * 0.02;
    const sr = 0.5 + (i % 3) * 0.5;
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(t * 2 + i);
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  for (let tx = 0; tx < LEVEL_W_TILES; tx++) {
    if (groundInGap(tx)) continue;
    const sx = tx * TILE - camera;
    if (sx < -TILE || sx > W + TILE) continue;
    for (let ty = groundY; ty <= groundY + 2; ty++) drawGroundTile(sx, ty * TILE, ty === groundY);
  }
}

function drawGroundTile(sx, sy, isTop) {
  ctx.fillStyle = isTop ? COLORS.groundTop : COLORS.ground;
  ctx.fillRect(sx, sy, TILE, TILE);
  if (isTop) {
    ctx.fillStyle = COLORS.groundHi;
    ctx.fillRect(sx + 1, sy + 1, TILE - 2, 3);
    // Occasional crystal shard on top
    if ((Math.floor(sx / TILE + camera / TILE) * 7 + 3) % 11 === 0) {
      ctx.fillStyle = COLORS.crystalGlow;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(sx + TILE/2, sy - 5);
      ctx.lineTo(sx + TILE/2 - 3, sy);
      ctx.lineTo(sx + TILE/2 + 3, sy);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  } else {
    ctx.fillStyle = COLORS.stoneDk;
    ctx.fillRect(sx, sy, 2, TILE);
    ctx.fillRect(sx, sy + TILE/2, TILE, 1);
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    for (let i = 0; i < p.w; i++) {
      const tx = p.x + i, sx = tx * TILE - camera;
      if (sx < -TILE || sx > W + TILE) continue;
      const key = `${tx}_${p.y}`;
      drawBlock(sx, p.y * TILE, blockHit[key] ? 'used' : p.t);
    }
  }
}

function drawBlock(sx, sy, type) {
  if (type === 'brick') {
    // Stone block
    ctx.fillStyle = COLORS.stone; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.stoneDk;
    ctx.fillRect(sx, sy + TILE/2 - 1, TILE, 2);
    ctx.fillRect(sx + TILE/3, sy, 1, TILE/2);
    ctx.fillRect(sx + 2*TILE/3, sy + TILE/2, 1, TILE/2);
    ctx.fillStyle = COLORS.stoneHi;
    ctx.fillRect(sx + 1, sy + 1, TILE - 2, 2);
  } else if (type === 'qblock') {
    // Crystal block — glowing
    const t = performance.now() / 600;
    ctx.fillStyle = COLORS.crystal; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.crystalHi;
    ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(t);
    ctx.fillStyle = COLORS.crystalGlow;
    ctx.fillRect(sx + 6, sy + 6, TILE - 12, TILE - 12);
    ctx.globalAlpha = 1;
    // ✦ glyph
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('✦', sx + TILE/2, sy + TILE - 9);
  } else if (type === 'hblock') {
    // Heart block — pink/red pulsing
    const t = performance.now() / 500;
    ctx.fillStyle = '#881133'; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#cc2255';
    ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
    ctx.globalAlpha = 0.4 + 0.3 * Math.sin(t);
    ctx.fillStyle = '#ff6699';
    ctx.fillRect(sx + 6, sy + 6, TILE - 12, TILE - 12);
    ctx.globalAlpha = 1;
    // ❤ glyph
    ctx.fillStyle = '#ffccdd'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('❤', sx + TILE/2, sy + TILE - 8);
  } else {
    // Used block — dim
    ctx.fillStyle = COLORS.stoneDk; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.stone;
    ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
  }
}

function drawPipes() {
  for (const pipe of pipes) {
    const sx = pipe.x * TILE - camera;
    if (sx < -64 || sx > W + 64) continue;
    for (let j = 0; j < pipe.h; j++) drawPipeTile(sx, (groundY - j) * TILE, j === 0);
  }
}

function drawPipeTile(sx, sy, isTop) {
  const pw = TILE * 2;
  // Stone column body
  ctx.fillStyle = COLORS.column; ctx.fillRect(sx, sy, pw, TILE);
  ctx.fillStyle = COLORS.columnHi;
  ctx.fillRect(sx + 4, sy, 6, TILE);
  ctx.fillRect(sx + pw - 10, sy, 4, TILE);
  ctx.fillStyle = '#11101e';
  ctx.fillRect(sx, sy, 3, TILE);
  ctx.fillRect(sx + pw - 3, sy, 3, TILE);
  if (isTop) {
    // Capital / carved top
    ctx.fillStyle = '#2e2e50'; ctx.fillRect(sx - 5, sy, pw + 10, 12);
    ctx.fillStyle = '#3e4e60'; ctx.fillRect(sx - 3, sy, pw + 6, 4);
    // Glowing rune
    const t = performance.now() / 900;
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(t);
    ctx.fillStyle = COLORS.crystalGlow;
    ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText('ᚠ', sx + pw/2, sy + 10);
    ctx.globalAlpha = 1;
  }
}

function drawCoins() {
  const t = performance.now() / 400;
  for (const coin of coins) {
    if (coin.collected) continue;
    const sx = coin.x + TILE/2 - camera;
    if (sx < -TILE || sx > W + TILE) continue;
    const sy = coin.y + TILE/2 + Math.sin(coin.bobTimer) * 3;
    // Glow
    ctx.globalAlpha = 0.25 + 0.15 * Math.sin(t + coin.id);
    ctx.fillStyle = COLORS.orb;
    ctx.beginPath(); ctx.arc(sx, sy, 11, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Core
    ctx.fillStyle = COLORS.orb;
    ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe090';
    ctx.beginPath(); ctx.arc(sx - 1.5, sy - 1.5, 2, 0, Math.PI*2); ctx.fill();
  }
}


function drawLockOn(g) {
  const sx = g.x + g.w / 2 - camera;
  const sy = g.y + g.h / 2;
  const t = performance.now() / 150;
  const r = g.w * 0.8 + Math.sin(t) * 4;
  ctx.save();
  ctx.strokeStyle = '#ffff00';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.85;
  // Corner brackets
  const hs = r * 0.5;
  for (const [ox, oy, sx2, sy2] of [[-r,-r,1,0],[-r,-r,0,1],[r,-r,-1,0],[r,-r,0,1],[-r,r,1,0],[-r,r,0,-1],[r,r,-1,0],[r,r,0,-1]]) {
    ctx.beginPath();
    ctx.moveTo(sx + ox, sy + oy);
    ctx.lineTo(sx + ox + sx2 * hs, sy + oy + sy2 * hs);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawEnemy(g) {
  const sx = g.x - camera;
  if (sx < -TILE * 2 || sx > W + TILE * 2) return;
  if (player.homingTarget === g || g.lockFlash > 0) drawLockOn(g);
  const cx = sx + g.w / 2, cy = g.y + g.h / 2;
  const wf = Math.floor(g.frame) % 2;
  const t = performance.now() / 400;
  // Hit flash overlay
  if (g.hitFlash > 0 && Math.floor(g.hitFlash / 3) % 2 === 0) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(cx, cy, g.w / 2, g.h / 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    return;
  }

  if (g.flying) {
    // Bat-like flying creature — dark brown, wings flapping
    const wingSpan = 18 + Math.sin(t * 3 + g.wobble) * 6;
    ctx.fillStyle = '#2a2018';
    // Body
    ctx.beginPath(); ctx.ellipse(cx, cy, 9, 7, 0, 0, Math.PI*2); ctx.fill();
    // Wings
    ctx.fillStyle = '#3c3020';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 2);
    ctx.lineTo(cx - wingSpan, cy - 4 - Math.abs(Math.sin(t*3+g.wobble))*8);
    ctx.lineTo(cx - wingSpan + 8, cy + 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx, cy - 2);
    ctx.lineTo(cx + wingSpan, cy - 4 - Math.abs(Math.sin(t*3+g.wobble))*8);
    ctx.lineTo(cx + wingSpan - 8, cy + 4);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff4466';
    ctx.beginPath(); ctx.arc(cx - 3, cy - 1, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 3, cy - 1, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.arc(cx - 3, cy - 1, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 3, cy - 1, 1, 0, Math.PI*2); ctx.fill();
  } else {
    // Ground blob creature — pink
    const squish = wf ? 1.1 : 0.95;
    ctx.save(); ctx.translate(cx, g.y + g.h);
    ctx.scale(1 / squish, squish);
    // Body
    ctx.fillStyle = '#cc3a7a';
    ctx.beginPath(); ctx.ellipse(0, -g.h/2, g.w/2 - 2, g.h/2 - 1, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ee5a9a';
    ctx.beginPath(); ctx.ellipse(-2, -g.h/2 - 1, g.w/2 - 6, g.h/2 - 5, 0, 0, Math.PI*2); ctx.fill();
    // Eyes — glow
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5, -g.h * 0.65, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -g.h * 0.65, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff2266';
    ctx.beginPath(); ctx.arc(-5, -g.h * 0.65, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -g.h * 0.65, 2, 0, Math.PI*2); ctx.fill();
    // Tendrils / feet
    ctx.strokeStyle = '#cc3a7a'; ctx.lineWidth = 3;
    const legOff = wf ? 4 : -4;
    ctx.beginPath(); ctx.moveTo(-6, -4); ctx.lineTo(-8 + legOff, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6, -4); ctx.lineTo(8 - legOff, 2); ctx.stroke();
    ctx.restore();
    // Slime trail
    if (wf) {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#cc3a7a';
      ctx.beginPath(); ctx.ellipse(cx - g.vx * 6, g.y + g.h - 2, 6, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawGoombas() {
  for (const g of [...goombas, ...flyers]) {
    if (g.dead) {
      if (g.deadTimer > 0) {
        const sx = g.x + g.w/2 - camera;
        ctx.globalAlpha = g.deadTimer / 40;
        ctx.fillStyle = g.flying ? '#2a2018' : '#cc3a7a';
        ctx.beginPath(); ctx.arc(sx, g.y + g.h/2, 8, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      continue;
    }
    drawEnemy(g);
  }
}

function drawFlagPole() {
  const sx = FLAG_X * TILE - camera;
  const t = performance.now() / 500;
  // Beacon pillar
  ctx.fillStyle = '#2a2040'; ctx.fillRect(sx + TILE/2 - 4, 40, 8, groundY * TILE - 40);
  ctx.fillStyle = '#4a3a70'; ctx.fillRect(sx + TILE/2 - 2, 40, 4, groundY * TILE - 40);
  // Pulsing orb at top
  for (let r = 24; r > 0; r -= 6) {
    ctx.globalAlpha = (0.08 + 0.06 * Math.sin(t)) * (24 - r) / 24;
    ctx.fillStyle = COLORS.crystalGlow;
    ctx.beginPath(); ctx.arc(sx + TILE/2, 40, r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = COLORS.crystalGlow;
  ctx.beginPath(); ctx.arc(sx + TILE/2, 40, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(sx + TILE/2 - 2, 37, 3, 0, Math.PI*2); ctx.fill();
  // Energy rings rising
  for (let i = 0; i < 3; i++) {
    const ry = 40 + ((t * 60 + i * 40) % 180);
    ctx.globalAlpha = 1 - ry / 200;
    ctx.strokeStyle = COLORS.crystalGlow; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(sx + TILE/2, ry, 12, 4, 0, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  // Flicker every 4 frames while invincible
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;
  const sx = player.x - camera;
  ctx.save();
  ctx.translate(sx + player.w / 2, player.y + player.h / 2);
  const scaleX = player.dir === -1 ? -1 : 1;
  if (player.spinning || player.homing) ctx.rotate((player.spinAngle * Math.PI) / 180);
  ctx.scale(scaleX, 1);
  const img = !player.onGround && axo2Img.complete && axo2Img.naturalWidth > 0
    ? axo2Img : axoImg;
  if (img.complete && img.naturalWidth > 0)
    ctx.drawImage(img, -player.w / 2, -player.h / 2, player.w, player.h);
  else {
    ctx.fillStyle = '#ff69b4';
    ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
  }
  ctx.restore();
}

function drawParticlesAll() {
  // Coin pops
  for (let i = coinParticles.length - 1; i >= 0; i--) {
    const p = coinParticles[i]; p.y += p.vy; p.vy += 0.3; p.life--;
    if (p.life <= 0) { coinParticles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = COLORS.orb;
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, 5, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Dust
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const p = dustParticles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.r *= 0.93; p.life--;
    if (p.life <= 0) { dustParticles.splice(i, 1); continue; }
    ctx.globalAlpha = (p.life / p.maxLife) * 0.65;
    ctx.fillStyle = '#d4b483';
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Trail
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i]; p.r *= 0.9; p.life--;
    if (p.life <= 0) { trailParticles.splice(i, 1); continue; }
    const a = p.life / p.maxLife;
    if (p.bright) {
      ctx.globalAlpha = a * 0.9;
      ctx.fillStyle = `hsl(${p.hue},100%,85%)`;
      ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = a * 0.6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r * 0.45, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.globalAlpha = a * 0.75;
      ctx.fillStyle = `hsl(${p.hue},100%,70%)`;
      ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // Spindash sparks
  for (let i = spindashParticles.length - 1; i >= 0; i--) {
    const p = spindashParticles[i]; p.x += p.vx; p.y += p.vy; p.r *= 0.9; p.life--;
    if (p.life <= 0) { spindashParticles.splice(i, 1); continue; }
    ctx.globalAlpha = (p.life / p.maxLife) * 0.85;
    ctx.fillStyle = `hsl(${50 + Math.random()*20},100%,65%)`;
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Kill explosions
  for (let i = explosionParticles.length - 1; i >= 0; i--) {
    const p = explosionParticles[i];
    if (!p.flash) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; }
    p.r *= p.flash ? 0.75 : 0.96; p.life--;
    if (p.life <= 0) { explosionParticles.splice(i, 1); continue; }
    ctx.globalAlpha = p.flash ? (p.life / p.maxLife) : (p.life / p.maxLife) * 0.9;
    ctx.fillStyle = p.flash ? `hsl(${p.hue},100%,90%)` : `hsl(${p.hue},100%,60%)`;
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, Math.max(p.r, 0.5), 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Enemy projectiles
  for (const p of projectiles) {
    const sx = p.x - camera;
    const t = performance.now() / 80;
    // glowing orb: outer glow + core
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = p.flying ? '#505820' : '#c02020';
    ctx.beginPath(); ctx.arc(sx, p.y, 9, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = p.flying ? '#a0b840' : '#e84040';
    ctx.beginPath(); ctx.arc(sx, p.y, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx - 1.5, p.y - 1.5, 2, 0, Math.PI*2); ctx.fill();
  }
}

function drawDeathAnimation() {
  if (!dead || !player.dead) return;
  player.y += player.vy; player.vy += CFG.gravity;
  const sx = player.x - camera;
  ctx.save();
  ctx.translate(sx + player.w / 2, player.y + player.h / 2);
  ctx.rotate(Math.PI);
  if (axoImg.complete && axoImg.naturalWidth > 0)
    ctx.drawImage(axoImg, -player.w/2, -player.h/2, player.w, player.h);
  ctx.restore();
}

// ── Game loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  if (!dead) update(dt);

  // Draw with zoom
  ctx.save();
  // Deep space gradient sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#04041a');
  skyGrad.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Zoom: scale around canvas center, then shift so player stays centered
  ctx.translate(W / 2, H / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-W / 2, -H / 2);

  ctx.save();
  ctx.translate(0, -cameraY);

  drawBg();
  drawFlagPole();
  drawPipes();
  drawGround();
  drawPlatforms();
  drawCoins();
  drawGoombas();
  drawParticlesAll();
  if (!dead) drawPlayer();
  else drawDeathAnimation();

  ctx.restore();
  ctx.restore();

  // Combo flash
  if (comboCount >= 1 && comboTimer > 0) {
    const MAX_T = 120;
    const t = comboTimer / MAX_T;
    // zoom-in pop: scale goes 2.2 → 1.0 in first 20% then holds, fade out last 30%
    const popT = Math.min(1, (MAX_T - comboTimer) / 12);
    const scale = 2.2 - 1.2 * popT;
    const alpha = comboTimer < 36 ? comboTimer / 36 : 1;

    // pick color by count
    const colors = ['#ffffff','#ffe060','#ff9900','#ff4444','#ff6020','#cc3010'];
    const col = colors[Math.min(comboCount - 1, colors.length - 1)];

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.translate(W / 2, H / 2 - 40);
    ctx.scale(scale, scale);

    // glow halo
    ctx.shadowColor = col;
    ctx.shadowBlur = 40;

    // big number
    ctx.font = 'bold 90px monospace';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 8;
    ctx.strokeText(comboCount, 0, 0);
    ctx.fillStyle = col;
    ctx.fillText(comboCount, 0, 0);

    // sub-label
    ctx.shadowBlur = 0;
    ctx.font = 'bold 22px monospace';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    const sub = comboCount === 1 ? 'KILL!' : comboCount < 4 ? 'COMBO!' : comboCount < 7 ? 'SLAYING!' : 'UNSTOPPABLE!!';
    ctx.strokeText(sub, 0, 32);
    ctx.fillStyle = '#fff';
    ctx.fillText(sub, 0, 32);

    ctx.restore();
  }

  // Screen-space overlays
  if (won) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#d4a855'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
    ctx.fillText('★ YOU WIN! ★', W/2, H/2 - 10);
    ctx.fillStyle = '#fff'; ctx.font = '24px monospace';
    ctx.fillText('Score: ' + String(score).padStart(6,'0'), W/2, H/2 + 30);
    ctx.fillText('Press R to play again', W/2, H/2 + 60);
  }

  updateHUD();
  requestAnimationFrame(loop);
}

player.x = 48;
player.y = groundY * TILE - player.h;
updateHPBar();
requestAnimationFrame(loop);

// ── Zoom slider ──────────────────────────────────────────────────────────────
const zoomSlider = document.getElementById('zoom-slider');
const zoomVal    = document.getElementById('zoom-val');
zoomSlider.value = zoom;
zoomVal.textContent = zoom.toFixed(2) + 'x';
zoomSlider.addEventListener('input', () => {
  zoom = parseFloat(zoomSlider.value);
  zoomVal.textContent = zoom.toFixed(2) + 'x';
  localStorage.setItem('axo_zoom', zoom);
});

// ── Settings panel ────────────────────────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('click', () =>
  document.getElementById('settings-panel').classList.toggle('open'));
document.addEventListener('keydown', e => {
  if (e.code === 'Escape') document.getElementById('settings-panel').classList.remove('open');
});

const sliders = [
  { id: 's-gravity',  vid: 'v-gravity',  key: 'gravity',   fmt: v => v.toFixed(2) },
  { id: 's-gravity1', vid: 'v-gravity1', key: 'gravity1',  fmt: v => v.toFixed(2) },
  { id: 's-jump1',    vid: 'v-jump1',    key: 'jump1',     fmt: v => v.toFixed(1) },
  { id: 's-dashH',    vid: 'v-dashH',    key: 'dashH',     fmt: v => v.toFixed(1) },
  { id: 's-dashV',    vid: 'v-dashV',    key: 'dashV',     fmt: v => v.toFixed(1) },
  { id: 's-dashLen',  vid: 'v-dashLen',  key: 'dashLen',   fmt: v => Math.round(v) + 'f' },
  { id: 's-speed',    vid: 'v-speed',    key: 'moveSpeed', fmt: v => v.toFixed(1) },
  { id: 's-size',     vid: 'v-size',     key: 'axoSize',   fmt: v => v + 'px'     },
];

function syncSliders() {
  for (const s of sliders) {
    const el = document.getElementById(s.id);
    const vl = document.getElementById(s.vid);
    if (!el) continue;
    el.value = CFG[s.key];
    vl.textContent = s.fmt(CFG[s.key]);
  }
}

for (const s of sliders) {
  const el = document.getElementById(s.id);
  const vl = document.getElementById(s.vid);
  if (!el) continue;
  el.addEventListener('input', () => {
    CFG[s.key] = parseFloat(el.value);
    vl.textContent = s.fmt(CFG[s.key]);
    saveCFG();
  });
}

document.getElementById('s-reset').addEventListener('click', () => {
  Object.assign(CFG, DEFAULTS); syncSliders(); saveCFG();
});
syncSliders();

// ── Key rebinding ─────────────────────────────────────────────────────────────
function codeToLabel(code) {
  if (!code) return '?';
  if (code === 'Space') return 'Space';
  if (code.startsWith('Arrow')) return '↑↓←→'.split('')[['Up','Down','Left','Right'].indexOf(code.slice(5))] ?? code.slice(5);
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  return code;
}

function syncKeyButtons() {
  document.querySelectorAll('.key-btn').forEach(btn => {
    const action = btn.dataset.action;
    btn.textContent = codeToLabel(KEYS[action]);
  });
}

let listeningBtn = null;
document.querySelectorAll('.key-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (listeningBtn) listeningBtn.classList.remove('listening');
    listeningBtn = btn;
    btn.classList.add('listening');
    btn.textContent = '...';
  });
});

document.addEventListener('keydown', e => {
  if (!listeningBtn) return;
  e.preventDefault();
  if (e.code === 'Escape') {
    listeningBtn.classList.remove('listening');
    listeningBtn = null;
    syncKeyButtons();
    return;
  }
  const action = listeningBtn.dataset.action;
  KEYS[action] = e.code;
  saveKeys();
  listeningBtn.classList.remove('listening');
  listeningBtn = null;
  syncKeyButtons();
}, { capture: true });

document.getElementById('s-reset-keys').addEventListener('click', () => {
  Object.assign(KEYS, KEY_DEFAULTS);
  saveKeys();
  syncKeyButtons();
});

syncKeyButtons();
</script>
