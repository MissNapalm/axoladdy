<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axolotl World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; border: 2px solid #222; }
  #hud { color: #c8b89a; font-family: 'Courier New', monospace; font-size: 13px; background: #0f0d0b; width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; gap: 8px; }
  #jumpstate { color: #d4a855; font-weight: bold; flex: 1; text-align: center; }
  #zoom-wrap { display: flex; align-items: center; gap: 4px; }
  #zoom-wrap label { color: #a09080; white-space: nowrap; }
  #zoom-slider { width: 80px; accent-color: #c87840; }
  #zoom-val { color: #d4a855; width: 34px; text-align: right; }
  #hp-wrap { display: flex; align-items: center; gap: 3px; }
  .hrt { font-size: 18px; line-height: 1; transition: filter 0.1s; }
  .hrt.empty { filter: grayscale(1) brightness(0.35); }

  /* Settings panel */
  #settings-btn { position: fixed; top: 8px; right: 8px; background: #333; color: #fff; border: 1px solid #666; font-family: monospace; font-size: 13px; padding: 4px 10px; cursor: pointer; z-index: 100; }
  #settings-btn:hover { background: #555; }
  #settings-panel {
    display: none; position: fixed; top: 36px; right: 8px; background: #1a1a1a;
    border: 2px solid #443322; color: #fff; font-family: monospace; font-size: 13px;
    padding: 14px 16px; z-index: 99; width: 290px; max-height: 80vh; overflow-y: auto;
  }
  #settings-panel.open { display: block; }
  #settings-panel h3 { color: #d4a855; margin-bottom: 10px; font-size: 14px; letter-spacing: 1px; }
  #settings-panel label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
  #settings-panel span.lbl { flex: 1; color: #a09080; }
  #settings-panel input[type=range] { flex: 1; accent-color: #c87840; }
  #settings-panel span.val { width: 44px; text-align: right; color: #d4a855; }
  #settings-panel button { margin-top: 10px; width: 100%; padding: 5px; background: #c84c0c; border: none; color: #fff; font-family: monospace; font-size: 13px; cursor: pointer; }
  #settings-panel button:hover { background: #e86020; }
  #settings-panel hr { border-color: #444; margin: 10px 0; }
  .key-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .key-row span { color: #a09080; flex: 1; }
  .key-btn { background: #222; border: 1px solid #554433; color: #d4a855; font-family: monospace; font-size: 12px; padding: 3px 8px; cursor: pointer; min-width: 90px; text-align: center; }
  .key-btn.listening { background: #2a1a10; border-color: #e85030; color: #e85030; animation: blink 0.6s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #gameover {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  }
  #gameover.show { display: flex; }
  #gameover h1 { color: #e83030; font-family: monospace; font-size: 52px; letter-spacing: 4px; text-shadow: 0 0 24px #c02020; }
  #gameover p  { color: #c8b89a; font-family: monospace; font-size: 20px; }
  #gameover button { background: #2a1a10; border: 2px solid #c87840; color: #d4a855; font-family: monospace; font-size: 22px; padding: 10px 36px; cursor: pointer; letter-spacing: 2px; }
  #gameover button:hover { background: #3a2416; }
</style>
</head>
<body>
<div id="hud">
  <span>AXO <span id="score">000000</span></span>
  <div id="hp-wrap"></div>
  <span id="jumpstate">—</span>
  <span>ORBS <span id="coins">00</span></span>
  <div id="zoom-wrap">
    <label>ZOOM</label>
    <input type="range" id="zoom-slider" min="0.3" max="2.0" step="0.05" value="1.40">
    <span id="zoom-val">1.00x</span>
  </div>
  <select id="level-btn" style="background:#111;border:1px solid #446;color:#8af;font-family:monospace;font-size:12px;padding:3px 6px;cursor:pointer">
    <option value="0">LVL 1</option>
    <option value="1">LVL 2</option>
    <option value="2">LVL 3</option>
    <option value="3">LVL 4</option>
    <option value="4">LVL 5</option>
    <option value="5">LVL 6</option>
    <option value="6">LVL 7</option>
    <option value="7">LVL 8</option>
    <option value="8">LVL 9</option>
    <option value="9">LVL 10</option>
    <option value="10">LVL 11</option>
    <option value="11">BOSS: LEVIATHAN</option>
    <option value="12">BOSS: WRAITH</option>
    <option value="13">BOSS: WARDEN</option>
  </select>
</div>
<canvas id="c" width="800" height="450"></canvas>

<div id="gameover">
  <h1>GAME OVER</h1>
  <p id="go-score"></p>
  <button id="go-restart">RESTART</button>
</div>

<button id="settings-btn">⚙ Settings</button>
<div id="settings-panel">
  <h3>⚙ SETTINGS</h3>

  <label><span class="lbl">Gravity (ground)</span>
    <input type="range" id="s-gravity" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity"></span>
  </label>
  <label><span class="lbl">Gravity (air)</span>
    <input type="range" id="s-gravity1" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity1"></span>
  </label>
  <label><span class="lbl">Jump height</span>
    <input type="range" id="s-jump1" min="0.5" max="25" step="0.1">
    <span class="val" id="v-jump1"></span>
  </label>
  <label><span class="lbl">Dash horiz (F)</span>
    <input type="range" id="s-dashH" min="4" max="60" step="0.5">
    <span class="val" id="v-dashH"></span>
  </label>
  <label><span class="lbl">Dash up (F+Up)</span>
    <input type="range" id="s-dashV" min="4" max="40" step="0.5">
    <span class="val" id="v-dashV"></span>
  </label>
  <label><span class="lbl">Dash length (frames)</span>
    <input type="range" id="s-dashLen" min="4" max="40" step="1">
    <span class="val" id="v-dashLen"></span>
  </label>
  <hr>

  <label><span class="lbl">Move speed</span>
    <input type="range" id="s-speed" min="1" max="20" step="0.5">
    <span class="val" id="v-speed"></span>
  </label>
  <label><span class="lbl">Axo size (px)</span>
    <input type="range" id="s-size" min="16" max="96" step="2">
    <span class="val" id="v-size"></span>
  </label>
  <label><span class="lbl">Enemy size (px)</span>
    <input type="range" id="s-enemySize" min="16" max="80" step="2">
    <span class="val" id="v-enemySize"></span>
  </label>
  <label><span class="lbl">Sprite smoothing</span>
    <input type="range" id="s-smoothing" min="0" max="1" step="1">
    <span class="val" id="v-smoothing"></span>
  </label>
  <label><span class="lbl">Sprite rotation (°)</span>
    <input type="range" id="s-spriteRot" min="-45" max="45" step="1">
    <span class="val" id="v-spriteRot"></span>
  </label>
  <label><span class="lbl">Ground offset (px)</span>
    <input type="range" id="s-spriteOffset" min="-20" max="20" step="1">
    <span class="val" id="v-spriteOffset"></span>
  </label>
  <label><span class="lbl">Ball size (px)</span>
    <input type="range" id="s-ballSize" min="20" max="120" step="2">
    <span class="val" id="v-ballSize"></span>
  </label>

  <hr>
  <h3 style="margin-bottom:8px">⌨ KEY BINDINGS</h3>
  <div class="key-row"><span>Move Left</span>   <button class="key-btn" data-action="left"></button></div>
  <div class="key-row"><span>Move Right</span>  <button class="key-btn" data-action="right"></button></div>
  <div class="key-row"><span>Jump / Homing</span><button class="key-btn" data-action="jump"></button></div>
  <div class="key-row"><span>Up (aim / dash)</span><button class="key-btn" data-action="up"></button></div>
  <div class="key-row"><span>Dash</span>        <button class="key-btn" data-action="dash"></button></div>
  <button id="s-reset-keys" style="background:#2a1a10;margin-bottom:6px">Reset keys</button>
  <hr>

  <hr>
  <label><span class="lbl">Level theme</span>
    <select id="s-theme" style="background:#111;color:#ccc;border:1px solid #444;font-family:monospace;font-size:12px;padding:2px 4px;width:100%">
      <option value="city">City Night</option>
      <option value="forest">Forest</option>
      <option value="happy">Happy Hills</option>
      <option value="ice">Ice Cave</option>
    </select>
  </label>
  <button id="s-reset">Reset defaults</button>
</div>

  const defs = [];
  const cl = (x1,x2,y) => { for(let x=x1;x<=x2;x++) defs.push({x,y}); };

  return defs;

function buildSolids() {
  const lv = LEVELS[currentLevel];
  const solids = [];
  for (let tx = 0; tx < LEVEL_W_TILES; tx++) {
    if (groundInGap(tx)) continue;
    for (let ty = groundY; ty <= groundY + 2; ty++)
      solids.push({ x: tx * TILE, y: ty * TILE, w: TILE, h: TILE, type: 'ground', tx, ty });
  }
  for (const p of lv.platforms) {
    for (let i = 0; i < p.w; i++) {
      const tx = p.x + i, key = `${tx}_${p.y}`;
      solids.push({ x: tx * TILE, y: p.y * TILE, w: TILE, h: TILE, type: p.t, tx, ty: p.y, key });
    }
  }
  for (const pipe of lv.pipes) {
    for (let j = 0; j < pipe.h; j++) {
      const ty = groundY - j;
      solids.push({ x: pipe.x * TILE, y: ty * TILE, w: TILE * 2, h: TILE, type: j === 0 ? 'pipetop' : 'pipe', tx: pipe.x, ty });
    }
  }
  return solids;
}
let solids = buildSolids();

function getSolidsNear(px, py, pw, ph) {
  return solids.filter(s => s.x < px + pw + 96 && s.x + s.w > px - 96 && s.y < py + ph + 96 && s.y + s.h > py - 96);
}

function loadLevel(n) {
  currentLevel = ((n % LEVELS.length) + LEVELS.length) % LEVELS.length;
  localStorage.setItem('axo_level', currentLevel);
  const lv = LEVELS[currentLevel];

  solids = buildSolids();
  blockHit = {};

  coins = lv.coinDefs.map((c, i) => ({ id: i, x: c.x * TILE, y: c.y * TILE, collected: false, bobTimer: Math.random() * Math.PI * 2 }));
  // Every 3rd enemy in level 2+ is a 'shocker'
  const lvl = n; // 0-indexed
  goombas = lv.goombas.map((g, i) => {
    const type = (lvl >= 1 && i % 3 === 1) ? 'shocker' : 'normal';
    const h = 2; // goombas always 2 hits
    return { id: i, x: g.x * TILE, y: groundY * TILE - TILE, vx: -1.4, w: TILE, h: TILE, dead: false, deadTimer: 0, pl: g.pl * TILE, pr: g.pr * TILE, frame: 0, flying: false, hp: h, maxHp: h, hitFlash: 0, type, shockStun: 0 };
  });
  flyers = lv.flyers.map((f, i) => {
    const type = (lvl >= 1 && i % 3 === 2) ? 'shocker' : 'normal';
    const h = 3; // bats always 3 hits
    return { id: i + 1000, x: f.x * TILE, baseY: f.fy, y: f.fy, vx: 1.2, w: TILE, h: TILE, dead: false, deadTimer: 0, pl: f.x * TILE, pr: (f.x + f.pw) * TILE, frame: 0, flying: true, wobble: Math.random() * Math.PI * 2, hp: h, maxHp: h, hitFlash: 0, type, shockStun: 0 };
  });
  heartPickups = [];
  projectiles  = [];
  powerBoxes   = [];

  // Boss setup
  boss.active = false;
  wraith.active = false;
  warden.active = false;
  if (lv.isBossLevel && lv.bossType === 'leviathan') {
    Object.assign(boss, {
      active: true, dead: false, deadTimer: 0,
      hp: BOSS_MAX_HP, maxHp: BOSS_MAX_HP,

      orbs: [], orbCooldown: 0, ringCooldown: 0,
      teleportAlpha: 1, teleportTarget: { x: 0, y: 0 }, chargeSpeed: 0,
    });
  } else if (lv.isBossLevel && lv.bossType === 'wraith') {
    Object.assign(wraith, {
      active: true, dead: false, deadTimer: 0,
      hp: WRAITH_MAX_HP, maxHp: WRAITH_MAX_HP,
      phase: 1, state: 'idle', stateTimer: 120,

      dashWalls: [], gravZones: [], clones: [], shockwaves: [], tentacles: [],
      telegraphTimer: 0, telegraphType: '',
      surgeCount: 0, surgePhase: 'none', surgeLockX: 0,
    });
  } else if (lv.isBossLevel && lv.bossType === 'warden') {
    Object.assign(warden, {
      active: true, dead: false, deadTimer: 0,
      hp: WARDEN_MAX_HP, maxHp: WARDEN_MAX_HP,
      phase: 1, state: 'idle', stateTimer: 90,
      x: 70 * TILE, y: WARDEN_GROUND - 72, vx: 0, vy: 0, dir: -1,
      hitFlash: 0, lockFlash: 0, shakeX: 0, eyePulse: 0, invulTimer: 0,
      onGround: true, shockwaves: [], rocks: [],
    });
  }

  // reset player
  Object.assign(player, {
    x: TILE * 3, y: (groundY - 3) * TILE,
    vx: 0, vy: 0,
    onGround: false, jumping: false,
    homing: false, homingTarget: null, homingUsed: false, homingCount: 0,

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function spawnShockerBurst(g) {
  const cx = g.x + g.w / 2, cy = g.y + g.h / 2;
  const count = 8;
  for (let a = 0; a < count; a++) {
    const ang = (a / count) * Math.PI * 2;
    projectiles.push({ x: cx, y: cy, vx: Math.cos(ang) * 3.2, vy: Math.sin(ang) * 3.2, life: 80, flying: g.flying });
  }
  g.shockStun = 40; // freeze for ~2/3 sec
}

function damageEnemy(g, dmg) {
  if (g.dead) return false;
  g.hp -= dmg;
  if (g.hp <= 0) {
    g.dead = true; g.deadTimer = 40;
    score += g.flying ? 200 : 100; updateHUD();
    spawnExplosion(g.x + g.w / 2, g.y + g.h / 2, g.flying);
    playSound('hit', 0.6);
    if (Math.random() < 0.28) {
      heartPickups.push({ x: g.x + g.w / 2 - 10, y: g.y, vx: (Math.random() - 0.5) * 3, vy: -5, collected: false, bobTimer: 0 });
    }
    // Frenzy kill counter — fills meter, R to activate
    if (player.frenzyTimer <= 0) {
      player.frenzyKills = Math.min(player.frenzyKills + 1, 7);
    }
    return true; // killed
  }
  // Shocker: emit a ring burst every time it's hit
  if (g.type === 'shocker') spawnShockerBurst(g);
  g.hitFlash = 18; // stagger flash
  playSound('hit', 0.35);
  return false; // hurt but alive
}

function spawnExplosion(x, y, flying) {
  const hue = flying ? 280 : 140;
  for (let i = 0; i < 24; i++) {
    const angle = (Math.PI * 2 * i / 24) + Math.random() * 0.3;
    const speed = 2.5 + Math.random() * 5;
    explosionParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      r: 2 + Math.random() * 5,
      life: 28 + Math.floor(Math.random() * 22),
      maxLife: 50,
      hue: hue + (Math.random() - 0.5) * 40,
    });
  }
  // bright flash blob
  explosionParticles.push({ x, y, vx:0, vy:0, r:18, life:6, maxLife:6, hue: flying?300:60, flash:true });
}

function updateHPBar() {
  const wrap = document.getElementById('hp-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < MAX_HP; i++) {
    const s = document.createElement('span');
    s.className = 'hrt' + (i < hp ? '' : ' empty');
    s.textContent = '❤';
    wrap.appendChild(s);
  }
}

function spawnSpindash(x, y, dir) {
  for (let i = 0; i < 3; i++) {
    spindashParticles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      vx: -dir * (Math.random() * 4 + 2),
      vy: (Math.random() - 0.5) * 2,
      r: Math.random() * 4 + 2,
      life: 16 + Math.floor(Math.random() * 10),
      maxLife: 26,
    });
  }
}

// ── Physics ───────────────────────────────────────────────────────────────────
const HOMING_RANGE = 340; // px — reasonable lock-on range
const HOMING_SPEED = 14;

let prevJumpKey = false;
let prevUpKey   = false;
let prevEKey = false;

// ── Boss ──────────────────────────────────────────────────────────────────────
const BOSS_MAX_HP  = 18;
const BOSS_ARENA_X = 15 * TILE;   // left wall of arena
const BOSS_ARENA_R = 125 * TILE;  // right wall of arena
const BOSS_GROUND  = (groundY - 1) * TILE; // y when "standing"

const boss = {
  active: false,
  x: 60 * TILE, y: 4 * TILE,
  w: 72, h: 72,
  hp: BOSS_MAX_HP, maxHp: BOSS_MAX_HP,
  phase: 1,            // 1 / 2 / 3
  state: 'idle',       // idle | teleport | charge | fly | summon | slam | dead
  stateTimer: 0,
  vx: 0, vy: 0,
  dir: -1,
  hitFlash: 0,
  lockFlash: 0,
  dead: false,
  deadTimer: 0,
  flying: true,        // so homing targets it
  // teleport
  teleportAlpha: 0,
  teleportTarget: { x: 0, y: 0 },
  // charge
  chargeSpeed: 0,
  // slam weak points (phase 3) — small orbs that orbit the boss and must be homed into
  orbs: [],
  orbCooldown: 0,
  // ring projectile burst cooldown
  ringCooldown: 0,
  // eye glow pulse
  eyePulse: 0,
  // shake when hit
  shakeX: 0,
};

function bossPhaseFromHp() {
  const ratio = boss.hp / boss.maxHp;
  if (ratio > 0.6) return 1;
  if (ratio > 0.3) return 2;
  return 3;
}

function damageBoss(dmg) {
  if (boss.dead || boss.hitFlash > 0) return false;
  boss.hp -= dmg;
  boss.hitFlash = 20;
  boss.shakeX = 8;
  score += 500; updateHUD();
  if (boss.hp <= 0) {
    boss.hp = 0;
    boss.dead = true;
    boss.deadTimer = 180;
    boss.state = 'dead';
    spawnExplosion(boss.x + boss.w / 2, boss.y + boss.h / 2, true);
    comboCount += 5; comboTimer = 180;
    score += 5000; updateHUD();
    return true;
  }
  spawnExplosion(boss.x + boss.w / 2, boss.y + boss.h / 2, true);
  return false;
}

function bossSpawnOrbs() {
  boss.orbs = [];
  const count = boss.phase === 3 ? 6 : 4;
  for (let i = 0; i < count; i++) {
    boss.orbs.push({
      angle: (i / count) * Math.PI * 2,
      speed: 0.04 + boss.phase * 0.01,
      radius: 55 + i * 8,
      dead: false, deadTimer: 0,
      hp: 1, maxHp: 1, hitFlash: 0, lockFlash: 0,
      flying: true,
      // computed each frame:
      x: 0, y: 0, w: 20, h: 20,
    });
  }
}

function updateBoss() {
  if (!boss.active) return;
  if (boss.dead) {
    boss.deadTimer--;
    if (boss.deadTimer <= 0) { won = true; player.wonSlide = true; score += 1000; updateHUD(); }
    return;
  }

  boss.phase = bossPhaseFromHp();
  if (boss.hitFlash > 0) boss.hitFlash--;
  if (boss.shakeX > 0) boss.shakeX = Math.max(0, boss.shakeX - 1.2);
  boss.eyePulse += 0.08;

  // Update orbiting orbs
  for (let i = boss.orbs.length - 1; i >= 0; i--) {
    const o = boss.orbs[i];
    if (o.dead) { o.deadTimer--; if (o.deadTimer <= 0) boss.orbs.splice(i, 1); continue; }
    o.angle += o.speed;
    o.x = boss.x + boss.w / 2 + Math.cos(o.angle) * o.radius - o.w / 2;
    o.y = boss.y + boss.h / 2 + Math.sin(o.angle) * o.radius - o.h / 2;
    if (o.hitFlash > 0) o.hitFlash--;
    if (o.lockFlash > 0) o.lockFlash--;

    // Player homing into orb
    if (player.homingTarget === o) {
      const tx = o.x + o.w / 2, ty = o.y + o.h / 2;
      const px = player.x + player.w / 2, py = player.y + player.h / 2;
      const dx = tx - px, dy = ty - py;
      const dist = Math.hypot(dx, dy);
      if (dist < 14) {
        o.dead = true; o.deadTimer = 30;
        player.homing = false; player.homingTarget = null;
        player.ballForm = true;
        player.vy = Math.min(player.vy, -CFG.jump1 * 0.6);
        player.vx = player.dir * CFG.moveSpeed * 1.5;
        player.spinning = false; player.homingUsed = false;
        comboCount++; comboTimer = 120;
        // Each orb death damages boss
        damageBoss(1);
      } else {
        player.vx = (dx / dist) * HOMING_SPEED;
        player.vy = (dy / dist) * HOMING_SPEED;
        if (player.vx > 0) player.dir = 1; else player.dir = -1;
        spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
      }
    }

    // Orb damages player on contact
    if (!o.dead && player.invincible === 0 && !player.homing && !player.ballForm && !player.dashFrames) {
      if (rectsOverlap({ x: o.x + 3, y: o.y + 3, w: o.w - 6, h: o.h - 6 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
        hurtPlayer(1); player.invincible = 80;
        player.vy = -8; player.vx = (player.x < o.x ? -1 : 1) * 9;
        if (hp <= 0) { killPlayer(); return; }
      }
    }
  }
  // All orbs gone — boss takes direct hit vulnerability window handled via state machine below

  boss.stateTimer--;

  // ── State machine ───────────────────────────────────────────────────────────
  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  const bx = boss.x + boss.w / 2, by = boss.y + boss.h / 2;

  if (boss.state === 'idle') {
    // Hover gently
    boss.vy = Math.sin(performance.now() / 400) * 0.5;
    boss.y += boss.vy;
    boss.dir = px < bx ? -1 : 1;

    if (boss.stateTimer <= 0) {
      // Choose next attack based on phase
      const r = Math.random();
      if (boss.phase === 1) {
        if (r < 0.4) { boss.state = 'teleport'; boss.stateTimer = 30; }
        else if (r < 0.7) { boss.state = 'summon'; boss.stateTimer = 20; }
        else { boss.state = 'ring'; boss.stateTimer = 10; }
      } else if (boss.phase === 2) {
        if (r < 0.35) { boss.state = 'charge'; boss.stateTimer = 20; boss.chargeSpeed = 0; }
        else if (r < 0.65) { boss.state = 'ring'; boss.stateTimer = 10; }
        else { boss.state = 'summon'; boss.stateTimer = 20; }
      } else {
        if (r < 0.3) { boss.state = 'slam'; boss.stateTimer = 30; }
        else if (r < 0.6) { boss.state = 'ring'; boss.stateTimer = 8; }
        else { boss.state = 'summon'; boss.stateTimer = 15; }
      }
    }

  } else if (boss.state === 'teleport') {
    // Flash out, reappear above player
    boss.teleportAlpha = Math.max(0, boss.stateTimer / 30);
    if (boss.stateTimer <= 0) {
      const tx = Math.max(BOSS_ARENA_X, Math.min(BOSS_ARENA_R - boss.w, px - boss.w / 2 + (Math.random() - 0.5) * 180));
      boss.x = tx;
      boss.y = py - 120 - Math.random() * 80;
      boss.y = Math.max(TILE, boss.y);
      boss.teleportAlpha = 1;
      boss.state = 'idle';
      boss.stateTimer = 60 + Math.floor(Math.random() * 40);
      // Fire 8-way burst on reappear
      for (let a = 0; a < 8; a++) {
        const ang = (a / 8) * Math.PI * 2;
        const spd = 3.5 + boss.phase;
        projectiles.push({ x: bx, y: by, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 110, flying: true });
      }
    }

  } else if (boss.state === 'summon') {
    if (boss.stateTimer === 19) bossSpawnOrbs();
    boss.vy = Math.sin(performance.now() / 300) * 0.3;
    boss.y += boss.vy;
    if (boss.stateTimer <= 0) {
      boss.state = 'idle';
      boss.stateTimer = 80 + Math.floor(Math.random() * 60);
    }

  } else if (boss.state === 'ring') {
    // Fire concentric rings of projectiles aimed at player
    if (boss.stateTimer % 8 === 0) {
      const count = 6 + boss.phase * 2;
      for (let a = 0; a < count; a++) {
        const ang = (a / count) * Math.PI * 2 + (boss.stateTimer * 0.15);
        const spd = 2.8 + boss.phase * 0.6;
        projectiles.push({ x: bx, y: by, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 140, flying: true });
      }
    }
    if (boss.stateTimer <= 0) {
      boss.state = 'idle';
      boss.stateTimer = 70 + Math.floor(Math.random() * 50);
    }

  } else if (boss.state === 'charge') {
    // Phase 2+: charge across arena
    if (boss.stateTimer > 0 && boss.stateTimer <= 20) {
      // Wind-up — face player
      boss.dir = px < bx ? -1 : 1;
      boss.chargeSpeed = 0;
    } else {
      boss.chargeSpeed = -boss.dir * (12 + boss.phase * 2);
      boss.x += boss.chargeSpeed;
      // Bounce off arena walls
      if (boss.x < BOSS_ARENA_X) { boss.x = BOSS_ARENA_X; boss.dir *= -1; boss.stateTimer = Math.min(boss.stateTimer, 8); }
      if (boss.x + boss.w > BOSS_ARENA_R) { boss.x = BOSS_ARENA_R - boss.w; boss.dir *= -1; boss.stateTimer = Math.min(boss.stateTimer, 8); }
      // Spray projectiles during charge
      if (Math.random() < 0.3) {
        const spd = 3 + boss.phase;
        projectiles.push({ x: bx, y: by + 10, vx: (Math.random() - 0.5) * 4, vy: spd, life: 100, flying: true });
      }
    }
    if (boss.stateTimer <= 0) {
      boss.vx = 0;
      boss.state = 'idle';
      boss.stateTimer = 50 + Math.floor(Math.random() * 40);
    }

  } else if (boss.state === 'slam') {
    // Phase 3: dive-bomb straight down at player, then back up
    if (boss.stateTimer > 15) {
      boss.vy = 0;
    } else if (boss.stateTimer > 0) {
      boss.vy = 14;
    } else {
      boss.vy = -10;
      boss.y += boss.vy;
      if (boss.y <= 2 * TILE) {
        boss.vy = 0;
        boss.state = 'idle';
        boss.stateTimer = 50;
        // Shockwave ring on return
        for (let a = 0; a < 12; a++) {
          const ang = (a / 12) * Math.PI * 2;
          projectiles.push({ x: bx, y: by, vx: Math.cos(ang) * 5, vy: Math.sin(ang) * 5, life: 120, flying: true });
        }
      }
    }
    boss.y += boss.vy;
    boss.y = Math.max(TILE, Math.min(BOSS_GROUND - boss.h, boss.y));
  }

  // Clamp boss to arena
  boss.x = Math.max(BOSS_ARENA_X, Math.min(BOSS_ARENA_R - boss.w, boss.x));
  boss.y = Math.max(TILE * 0.5, Math.min(BOSS_GROUND - boss.h, boss.y));

  // Boss body — player dash collision (damages boss directly when no orbs)
  const allOrbsDead = boss.orbs.every(o => o.dead);
  const bRect = { x: boss.x + 6, y: boss.y + 6, w: boss.w - 12, h: boss.h - 12 };
  const pRect = { x: player.x, y: player.y, w: player.w, h: player.h };
  if (rectsOverlap(bRect, pRect)) {
    if (player.dashFrames > 0 && boss.hitFlash === 0) {
      damageBoss(1);
      player.vx = -Math.sign(player.vx) * 10;
      player.vy = -7; player.dashFrames = 0; player.onGround = false;
    } else if (player.homing && player.homingTarget === boss && allOrbsDead) {
      damageBoss(1);
      player.homing = false; player.homingTarget = null; player.ballForm = true;
      player.vy = Math.min(player.vy, -CFG.jump1 * 0.6);
      player.vx = player.dir * CFG.moveSpeed * 1.5;
      player.homingUsed = false; comboCount++; comboTimer = 120;
    } else if (!player.homing && !player.ballForm && !player.dashFrames && player.invincible === 0) {
      hurtPlayer(1); player.invincible = 80;
      player.vy = -9; player.vx = (player.x < bx ? -1 : 1) * 10;
      if (hp <= 0) { killPlayer(); return; }
    }
  }

  // Boss homing target — only when orbs are dead or phase 1 with no orbs
  // (handled in nearestLiveGoomba extension below)
}

function drawBoss() {
  if (!boss.active) return;
  const bsx = boss.x - camera;
  if (bsx < -200 || bsx > W + 200) return;

  const t = performance.now() / 400;
  const phase = boss.phase;
  const alpha = boss.state === 'teleport' ? Math.max(0.05, boss.stateTimer / 30) : 1;
  const shk = Math.sin(performance.now() * 0.8) * (boss.shakeX > 0 ? boss.shakeX : 0);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(bsx + boss.w / 2 + shk, boss.y + boss.h / 2);

  // Phase-based tint
  const bodyColor  = phase === 1 ? '#1a0828' : phase === 2 ? '#280810' : '#080018';
  const accentColor= phase === 1 ? '#6600cc' : phase === 2 ? '#cc0044' : '#0044cc';
  const glowColor  = phase === 1 ? '#aa44ff' : phase === 2 ? '#ff2255' : '#44aaff';

  // Outer aura
  const grad = ctx.createRadialGradient(0, 0, boss.w * 0.3, 0, 0, boss.w * 0.9);
  grad.addColorStop(0, accentColor + '44');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0, 0, boss.w * 0.9, boss.h * 0.9, 0, 0, Math.PI * 2); ctx.fill();

  // Main body
  ctx.fillStyle = boss.hitFlash > 0 && Math.floor(boss.hitFlash / 3) % 2 === 0 ? '#ffffff' : bodyColor;
  ctx.beginPath(); ctx.ellipse(0, 0, boss.w / 2, boss.h / 2, 0, 0, Math.PI * 2); ctx.fill();

  // Carapace plates
  ctx.fillStyle = accentColor;
  ctx.globalAlpha = alpha * 0.7;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 + t * 0.2;
    const px2 = Math.cos(a) * boss.w * 0.38, py2 = Math.sin(a) * boss.h * 0.38;
    ctx.beginPath(); ctx.ellipse(px2, py2, 10, 6, a, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = alpha;

  // Eyes — large, glowing
  const eyeGlow = 0.6 + 0.4 * Math.sin(boss.eyePulse * 3);
  ctx.fillStyle = glowColor;
  ctx.globalAlpha = alpha * eyeGlow;
  ctx.beginPath(); ctx.ellipse(-14, -8, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14, -8, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = alpha;
  ctx.beginPath(); ctx.ellipse(-14, -8, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14, -8, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000000';
  ctx.beginPath(); ctx.ellipse(-14 + boss.dir * 2, -8, 2.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14 + boss.dir * 2, -8, 2.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  // Mouth — jagged when attacking
  ctx.strokeStyle = glowColor; ctx.lineWidth = 2; ctx.globalAlpha = alpha * 0.9;
  ctx.beginPath();
  if (boss.state === 'charge' || boss.state === 'slam') {
    // Open maw
    ctx.moveTo(-18, 12);
    for (let i = 0; i < 6; i++) ctx.lineTo(-18 + i * 6 + (i % 2 === 0 ? 0 : 3), 12 + (i % 2 === 0 ? 8 : 0));
    ctx.lineTo(18, 12);
  } else {
    ctx.arc(0, 10, 14, 0.2, Math.PI - 0.2);
  }
  ctx.stroke();
  ctx.globalAlpha = alpha;

  // HP bar above boss
  const barW = boss.w * 1.8, barH = 7;
  const barX = -barW / 2, barY = -boss.h / 2 - 20;
  ctx.fillStyle = '#220000'; ctx.fillRect(barX, barY, barW, barH);
  const hpRatio = boss.hp / boss.maxHp;
  const hpColor = hpRatio > 0.6 ? '#aa44ff' : hpRatio > 0.3 ? '#ff2255' : '#44aaff';
  ctx.fillStyle = hpColor; ctx.fillRect(barX, barY, barW * hpRatio, barH);
  ctx.strokeStyle = '#ffffff44'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('LEVIATHAN', 0, barY - 3);

  ctx.restore();

  // Draw orbiting orbs (outside the translated context)
  for (const o of boss.orbs) {
    if (o.dead) continue;
    const osx = o.x - camera;
    const pulse = 0.7 + 0.3 * Math.sin(o.angle * 3 + t);
    ctx.save();
    ctx.globalAlpha = 0.5 * pulse;
    ctx.fillStyle = glowColor;
    ctx.beginPath(); ctx.arc(osx + o.w / 2, o.y + o.h / 2, o.w * 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    if (o.hitFlash > 0 && Math.floor(o.hitFlash / 3) % 2 === 0) {
      ctx.fillStyle = '#ffffff';
    } else {
      ctx.fillStyle = accentColor;
    }
    ctx.beginPath(); ctx.arc(osx + o.w / 2, o.y + o.h / 2, o.w / 2, 0, Math.PI * 2); ctx.fill();
    if (player.homingTarget === o || o.lockFlash > 0) drawLockOn(o);
    ctx.restore();
  }

  // Draw lock-on on boss itself if targeted
  if (player.homingTarget === boss || boss.lockFlash > 0) drawLockOn(boss);
}

const WRAITH_ARENA_X  = 10 * TILE;
const WRAITH_ARENA_R  = 135 * TILE;

  gravZones: [],
  clones: [],

// ── The Warden ────────────────────────────────────────────────────────────────
const WARDEN_MAX_HP  = 16;
const WARDEN_ARENA_X = 10 * TILE;
const WARDEN_ARENA_R = 135 * TILE;
const WARDEN_GROUND  = (groundY - 1) * TILE;

const warden = {
  active: false,
  x: 70 * TILE, y: WARDEN_GROUND,
  w: 72, h: 72,
  hp: WARDEN_MAX_HP, maxHp: WARDEN_MAX_HP,
  phase: 1,
  state: 'idle', stateTimer: 90,
  vx: 0, vy: 0, dir: -1,
  hitFlash: 0, lockFlash: 0,
  dead: false, deadTimer: 0,
  flying: false,
  onGround: true,
  eyePulse: 0, shakeX: 0,
  shockwaves: [],
  rocks: [],
  invulTimer: 0,
};

function damageWraith(dmg) {
  if (wraith.dead || wraith.hitFlash > 0 || wraith.invulTimer > 0) return false;
  wraith.hp -= dmg;
  wraith.hitFlash = 22;
  wraith.shakeX = 10;
  score += 600; updateHUD();
  if (wraith.hp <= 0) {
    wraith.hp = 0;
    wraith.dead = true; wraith.deadTimer = 200;
    wraith.state = 'dead';
    spawnExplosion(wraith.x + wraith.w / 2, wraith.y + wraith.h / 2, true);
    comboCount += 8; comboTimer = 200;
    score += 8000; updateHUD();
    return true;
  }
  // Phase transition invul (4 phases)
  const newPhase = wraith.hp > wraith.maxHp * 0.6 ? 1
                 : wraith.hp > wraith.maxHp * 0.3 ? 2
                 : wraith.hp > wraith.maxHp * 0.1 ? 3 : 4;
  if (newPhase !== wraith.phase) {
    wraith.invulTimer = 90; wraith.phase = newPhase;
    wraith.clones = []; wraith.shockwaves = [];
    // Phase 4 entry: enter enrage immediately
    if (newPhase === 4) { wraith.state = 'surge'; wraith.stateTimer = 50; wraith.surgeCount = 0; }
  }
  spawnExplosion(wraith.x + wraith.w / 2, wraith.y + wraith.h / 2, true);
  return false;
}

function wraithSpawnClone() {
  // Assign sequential order numbers; must be killed in order 1→2→3
  const orderNum = wraith.clones.filter(c => !c.dead).length + 1;
  // Spawn near player to get in the way
  const spawnX = player.x + (Math.random() - 0.5) * 160;
  wraith.clones.push({
    x: Math.max(WRAITH_ARENA_X, Math.min(WRAITH_ARENA_R - 44, spawnX)),
    y: player.y,
    vx: -player.vx * 0.85,
    vy: 0,
    w: 44, h: 44,
    hp: 1, maxHp: 1,
    hitFlash: 0, lockFlash: 0,
    dead: false, deadTimer: 0,
    flying: false,
    onGround: false,
    angle: 0,
    orderNum,         // 1, 2, or 3 — must kill in this order
  });
}

function updateWraith() {
  if (!wraith.active) return;
  if (wraith.dead) {
    wraith.deadTimer--;
    if (wraith.deadTimer <= 0) { won = true; player.wonSlide = true; score += 1000; updateHUD(); }
    return;
  }

  wraith.eyePulse += 0.07;
  if (wraith.hitFlash > 0) wraith.hitFlash--;
  if (wraith.shakeX > 0) wraith.shakeX = Math.max(0, wraith.shakeX - 1.5);
  if (wraith.invulTimer > 0) wraith.invulTimer--;

  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  const wx = wraith.x + wraith.w / 2, wy = wraith.y + wraith.h / 2;

  // ── Clones ──────────────────────────────────────────────────────────────────
  for (let i = wraith.clones.length - 1; i >= 0; i--) {
    const cl = wraith.clones[i];
    if (cl.dead) { cl.deadTimer--; if (cl.deadTimer <= 0) wraith.clones.splice(i, 1); continue; }
    if (cl.hitFlash > 0) cl.hitFlash--;
    if (cl.lockFlash > 0) cl.lockFlash--;

    // Mirror player movement (inverted X)
    cl.vx = -player.vx;
    cl.vy += 0.32;
    if (cl.vy > 20) cl.vy = 20;
    cl.x += cl.vx;
    cl.y += cl.vy;
    cl.angle += 12;

    // Ground collision for clone
    const clGround = WRAITH_GROUND;
    if (cl.y + cl.h >= clGround) { cl.y = clGround - cl.h; cl.vy = 0; cl.onGround = true; }
    cl.x = Math.max(WRAITH_ARENA_X, Math.min(WRAITH_ARENA_R - cl.w, cl.x));

    // Only killable if no lower-order clone is still alive
    const clKillable = !wraith.clones.some(other => !other.dead && other.orderNum < cl.orderNum);

    // Homing into clone
    if (player.homingTarget === cl) {
      const tx = cl.x + cl.w / 2, ty = cl.y + cl.h / 2;
      const dx = tx - (player.x + player.w / 2), dy = ty - (player.y + player.h / 2);
      const dist = Math.hypot(dx, dy);
      if (dist < 14) {
        if (clKillable) {
          cl.dead = true; cl.deadTimer = 30;
          player.homing = false; player.homingTarget = null; player.ballForm = true;
          player.vy = Math.min(player.vy, -CFG.jump1 * 0.7);
          player.vx = player.dir * CFG.moveSpeed * 1.5;
          player.homingUsed = false; comboCount++; comboTimer = 120;
          damageWraith(1);
        } else {
          // bounce off — clone is locked
          player.homing = false; player.homingTarget = null;
          player.vy = -8; player.vx = -player.vx;
          if (player.invincible === 0) { hurtPlayer(1); player.invincible = 60; if (hp <= 0) { killPlayer(); return; } }
        }
      } else {
        player.vx = (dx / dist) * HOMING_SPEED;
        player.vy = (dy / dist) * HOMING_SPEED;
        if (player.vx > 0) player.dir = 1; else player.dir = -1;
        spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
      }
    }

    // Stomp / dash kill
    const clRect = { x: cl.x + 3, y: cl.y + 3, w: cl.w - 6, h: cl.h - 6 };
    const pRect  = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (!cl.dead && rectsOverlap(clRect, pRect)) {
      if (player.dashFrames > 0 && cl.hitFlash === 0 && clKillable) {
        cl.dead = true; cl.deadTimer = 30;
        player.vx = -Math.sign(player.vx) * 9; player.vy = -6;
        player.dashFrames = 0; comboCount++; comboTimer = 120;
        damageWraith(1);
      } else if (!player.homing && player.vy > 0 && player.y + player.h < cl.y + cl.h * 0.5 + 10 && clKillable) {
        cl.dead = true; cl.deadTimer = 30;
        player.vy = Math.min(player.vy, -7); comboCount++; comboTimer = 120;
        damageWraith(1);
      } else if (!player.homing && !player.ballForm && !player.dashFrames && player.invincible === 0) {
        hurtPlayer(1); player.invincible = 80;
        player.vy = -9; player.vx = (player.x < cl.x + cl.w / 2 ? -1 : 1) * 10;
        if (hp <= 0) { killPlayer(); return; }
      }
    }

  }

  // ── Shockwaves ──────────────────────────────────────────────────────────────
  for (let i = wraith.shockwaves.length - 1; i >= 0; i--) {
    const sw = wraith.shockwaves[i];
    sw.r += 6 + wraith.phase;
    sw.life--;
    if (sw.life <= 0 || sw.r > sw.maxR) { wraith.shockwaves.splice(i, 1); continue; }
    // Damage player if touching ring (thin band)
    const pdx = px - sw.cx, pdy = py - (WRAITH_GROUND - 4);
    const dist = Math.hypot(pdx, pdy);
    if (Math.abs(dist - sw.r) < 14 && player.onGround && player.invincible === 0) {
      hurtPlayer(1); player.invincible = 60;
      player.vy = -10;
      if (hp <= 0) { killPlayer(); return; }
    }
  }

  // ── Tentacles (phase 3 visual + hitbox) ─────────────────────────────────────
  if (wraith.phase >= 3 && wraith.tentacles.length === 0) {
    for (let i = 0; i < 6; i++) {
      wraith.tentacles.push({ angle: (i / 6) * Math.PI * 2, length: 40, targetLen: 80 + i * 15, speed: 0.025 + i * 0.004 });
    }
  }
  for (const tent of wraith.tentacles) {
    tent.angle += tent.speed;
    tent.length += (tent.targetLen - tent.length) * 0.05;
    // Tentacle tip
    const tipX = wraith.x + wraith.w / 2 + Math.cos(tent.angle) * tent.length;
    const tipY = wraith.y + wraith.h / 2 + Math.sin(tent.angle) * tent.length;
    if (rectsOverlap({ x: tipX - 10, y: tipY - 10, w: 20, h: 20 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
      if (player.dashFrames > 0) {
        // Dash through — cut the tentacle briefly
        tent.targetLen = 20; setTimeout(() => { tent.targetLen = 80 + Math.random() * 40; }, 800);
        damageWraith(1);
        player.vx = -Math.sign(player.vx) * 8; player.vy = -5; player.dashFrames = 0;
      } else if (!player.homing && !player.ballForm && player.invincible === 0) {
        hurtPlayer(1); player.invincible = 70;
        player.vy = -8; player.vx = (player.x < tipX ? -1 : 1) * 9;
        if (hp <= 0) { killPlayer(); return; }
      }
    }
  }

  // ── State machine ───────────────────────────────────────────────────────────
  wraith.stateTimer--;

  // Float toward player menacingly
  const targetX = Math.max(WRAITH_ARENA_X, Math.min(WRAITH_ARENA_R - wraith.w, px - wraith.w / 2 + (Math.sin(wraith.eyePulse * 0.4) * 60)));
  const targetY = Math.max(TILE, Math.min(WRAITH_GROUND - wraith.h * 1.5, py - wraith.h * 1.2));
  wraith.x += (targetX - wraith.x) * 0.018;
  wraith.y += (targetY - wraith.y) * 0.018;
  wraith.dir = px < wx ? -1 : 1;

  if (wraith.state === 'idle') {
    if (wraith.stateTimer <= 0) {
      const r = Math.random();
      if (wraith.phase === 1) {
        if      (r < 0.5)  { wraith.state = 'clonewave'; wraith.stateTimer = 30; }
        else               { wraith.state = 'ring';      wraith.stateTimer = 40; }
      } else if (wraith.phase === 2) {
        if      (r < 0.4)  { wraith.state = 'clonewave'; wraith.stateTimer = 25; }
        else if (r < 0.7)  { wraith.state = 'stomp';     wraith.stateTimer = 40; }
        else               { wraith.state = 'ring';      wraith.stateTimer = 40; }
      } else if (wraith.phase === 3) {
        if      (r < 0.35) { wraith.state = 'clonewave'; wraith.stateTimer = 20; }
        else if (r < 0.65) { wraith.state = 'stomp';     wraith.stateTimer = 32; }
        else               { wraith.state = 'ring';      wraith.stateTimer = 32; }
      } else {
        // Phase 4 — pure aggression: surge after every clone clear
        if      (r < 0.4)  { wraith.state = 'clonewave'; wraith.stateTimer = 18; }
        else if (r < 0.65) { wraith.state = 'surge';     wraith.stateTimer = 50; wraith.surgeCount = 0; }
        else if (r < 0.8)  { wraith.state = 'stomp';     wraith.stateTimer = 28; }
        else               { wraith.state = 'ring';      wraith.stateTimer = 28; }
      }
    }

  } else if (wraith.state === 'clonewave') {
    if (wraith.stateTimer === 29) wraithSpawnClone();
    if (wraith.phase >= 2 && wraith.stateTimer === 15) wraithSpawnClone();
    if (wraith.phase >= 3 && wraith.stateTimer === 1) wraithSpawnClone();
    if (wraith.stateTimer <= 0) { wraith.state = 'idle'; wraith.stateTimer = 80 + Math.floor(Math.random() * 40); }

  } else if (wraith.state === 'stomp') {
    // Slam down, create ground shockwave
    if (wraith.stateTimer === 39) {
      wraith.vy = 16;
    }
    if (wraith.stateTimer > 0) {
      wraith.y += wraith.vy;
      wraith.vy *= 0.92;
    }
    if (wraith.stateTimer === 1) {
      // Emit shockwaves in both directions from directly below
      const cx = wraith.x + wraith.w / 2;
      wraith.shockwaves.push({ cx, r: 10, maxR: 350, life: 55, maxLife: 55 });
      if (wraith.phase >= 2) wraith.shockwaves.push({ cx: cx - 60, r: 5, maxR: 280, life: 50, maxLife: 50 });
      if (wraith.phase >= 3) wraith.shockwaves.push({ cx: cx + 60, r: 5, maxR: 280, life: 50, maxLife: 50 });
      wraith.vy = -12;
    }
    if (wraith.stateTimer <= 0) {
      wraith.vy = 0;
      wraith.state = 'idle';
      wraith.stateTimer = 50 + Math.floor(Math.random() * 30);
    }

  } else if (wraith.state === 'ring') {
    // One ring burst, once, at the start
    if (wraith.stateTimer === 39) {
      const count = 8 + wraith.phase * 2;
      for (let a = 0; a < count; a++) {
        const ang = (a / count) * Math.PI * 2;
        const spd = 2.5 + wraith.phase * 0.5;
        projectiles.push({ x: wx, y: wy, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 150, flying: true });
      }
    }
    if (wraith.stateTimer <= 0) { wraith.state = 'idle'; wraith.stateTimer = 80 + Math.floor(Math.random() * 50); }

  } else if (wraith.state === 'surge') {
    // Phase 4 anti-hover: wraith snaps directly beneath the player then rockets up
    // Telegraph: stateTimer 50→35 — wraith slides horizontally under player (telegraphed)
    // Launch:    stateTimer 35 — fire upward
    // Chase:     wraith.vy carries it up, deal damage if it hits player from below
    if (wraith.stateTimer === 49) {
      // Lock target X (player's current position)
      wraith.surgeLockX = Math.max(WRAITH_ARENA_X + 10, Math.min(WRAITH_ARENA_R - wraith.w - 10, player.x + player.w / 2 - wraith.w / 2));
      wraith.surgePhase = 'snap';
    }
    if (wraith.surgePhase === 'snap') {
      // Slide quickly beneath player horizontally
      wraith.x += (wraith.surgeLockX - wraith.x) * 0.18;
      // Move below player (just off screen if needed)
      const targetSurgeY = Math.min(WRAITH_GROUND - wraith.h, player.y + player.h + 20);
      wraith.y += (targetSurgeY - wraith.y) * 0.15;
      if (wraith.stateTimer === 36) {
        wraith.surgePhase = 'rise';
        wraith.vy = -28;  // fast upward rocket
        wraith.vx = (player.x + player.w / 2 > wraith.x + wraith.w / 2 ? 1 : -1) * 3;
      }
    }
    if (wraith.surgePhase === 'rise') {
      wraith.x += wraith.vx;
      wraith.y += wraith.vy;
      wraith.vy += 0.6;  // gravity pulls back
      wraith.x = Math.max(WRAITH_ARENA_X, Math.min(WRAITH_ARENA_R - wraith.w, wraith.x));
      // Damage player on contact during rise
      const wRise = { x: wraith.x + 4, y: wraith.y + 4, w: wraith.w - 8, h: wraith.h - 8 };
      const pR = { x: player.x, y: player.y, w: player.w, h: player.h };
      if (rectsOverlap(wRise, pR)) {
        if (player.dashFrames > 0) {
          damageWraith(2);  // reward the counter-dash
          player.vx = -Math.sign(player.vx || 1) * 14; player.vy = -10; player.dashFrames = 0;
          wraith.surgePhase = 'cooldown'; wraith.vy = -5;
        } else if (player.invincible === 0) {
          hurtPlayer(2); player.invincible = 100;
          player.vy = player.vy < 0 ? 12 : -10;
          player.vx = (player.x < wraith.x + wraith.w / 2 ? -1 : 1) * 12;
          if (hp <= 0) { killPlayer(); return; }
        }
      }
      // After apex, go to cooldown
      if (wraith.vy > 4) { wraith.surgePhase = 'cooldown'; }
    }
    if (wraith.stateTimer <= 0) {
      wraith.surgeCount++;
      if (wraith.surgeCount < 3) {
        // Surge again — snap to new position
        wraith.stateTimer = 50;
        wraith.surgeLockX = Math.max(WRAITH_ARENA_X + 10, Math.min(WRAITH_ARENA_R - wraith.w - 10, player.x + player.w / 2 - wraith.w / 2));
        wraith.surgePhase = 'snap';
      } else {
        wraith.surgePhase = 'none';
        wraith.state = 'idle'; wraith.stateTimer = 40 + Math.floor(Math.random() * 20);
      }
    }
  }

  wraith.x = Math.max(WRAITH_ARENA_X, Math.min(WRAITH_ARENA_R - wraith.w, wraith.x));
  wraith.y = Math.max(TILE, Math.min(WRAITH_GROUND - wraith.h, wraith.y));

  // ── Direct hit detection ─────────────────────────────────────────────────────
  // Wraith is only directly damageable when all clones are dead
  const allClonesDead = wraith.clones.every(c => c.dead);
  const wRect = { x: wraith.x + 8, y: wraith.y + 8, w: wraith.w - 16, h: wraith.h - 16 };
  const pRect2 = { x: player.x, y: player.y, w: player.w, h: player.h };
  if (rectsOverlap(wRect, pRect2)) {
    if (player.dashFrames > 0 && wraith.hitFlash === 0 && allClonesDead) {
      damageWraith(1);
      player.vx = -Math.sign(player.vx) * 10; player.vy = -7;
      player.dashFrames = 0; player.onGround = false;
    } else if (player.homing && player.homingTarget === wraith && allClonesDead) {
      damageWraith(1);
      player.homing = false; player.homingTarget = null; player.ballForm = true;
      player.vy = Math.min(player.vy, -CFG.jump1 * 0.7);
      player.vx = player.dir * CFG.moveSpeed * 1.5;
      player.homingUsed = false; comboCount++; comboTimer = 120;
    } else if (!player.homing && !player.ballForm && !player.dashFrames && player.invincible === 0) {
      hurtPlayer(1); player.invincible = 80;
      player.vy = -9; player.vx = (player.x < wx ? -1 : 1) * 11;
      if (hp <= 0) { killPlayer(); return; }
    }
  }
}

function drawWraith() {
  if (!wraith.active) return;
  const wsx = wraith.x - camera;
  if (wsx < -200 || wsx > W + 200) return;

  const t = performance.now() / 400;
  const phase = wraith.phase;
  const shk = Math.sin(performance.now() * 0.9) * (wraith.shakeX > 0 ? wraith.shakeX : 0);

  const bodyColor   = phase === 1 ? '#080818' : phase === 2 ? '#180808' : phase === 3 ? '#000000' : '#111100';
  const accentColor = phase === 1 ? '#3300aa' : phase === 2 ? '#aa0000' : phase === 3 ? '#ff6600' : '#dddd00';
  const glowColor   = phase === 1 ? '#6644ff' : phase === 2 ? '#ff3300' : phase === 3 ? '#ffaa00' : '#ffffaa';

  // ── Draw shockwaves ──────────────────────────────────────────────────────────
  for (const sw of wraith.shockwaves) {
    const fade = sw.life / sw.maxLife;
    ctx.save();
    ctx.globalAlpha = fade * 0.8;
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 5 * fade + 1;
    ctx.beginPath();
    ctx.arc(sw.cx - camera, WRAITH_GROUND - 4, sw.r, Math.PI, 0);
    ctx.stroke();
    ctx.restore();
  }

  // ── Draw clones ──────────────────────────────────────────────────────────────
  for (const cl of wraith.clones) {
    if (cl.dead) continue;
    const clsx = cl.x - camera;
    ctx.save();
    ctx.translate(clsx + cl.w / 2, cl.y + cl.h / 2);
    ctx.rotate(cl.angle * Math.PI / 180);
    const flash = cl.hitFlash > 0 && Math.floor(cl.hitFlash / 3) % 2 === 0;
    ctx.fillStyle = flash ? '#ffffff' : '#220011';
    ctx.beginPath(); ctx.ellipse(0, 0, cl.w / 2, cl.h / 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = accentColor; ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.ellipse(0, 0, cl.w / 2 - 6, cl.h / 2 - 6, 0, 0, Math.PI * 2); ctx.fill();
    // Glowing eyes
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(wraith.eyePulse * 4);
    ctx.fillStyle = glowColor;
    ctx.beginPath(); ctx.arc(-8, -5, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8, -5, 5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    if (player.homingTarget === cl || cl.lockFlash > 0) drawLockOn(cl);

    // Order number — dim if not yet killable, bright if it's this clone's turn
    const killable = !wraith.clones.some(other => !other.dead && other.orderNum < cl.orderNum);
    ctx.save();
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (killable) {
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = glowColor; ctx.shadowBlur = 12;
    } else {
      ctx.fillStyle = '#666688';
      ctx.shadowBlur = 0;
    }
    ctx.fillText(String(cl.orderNum), clsx + cl.w / 2, cl.y + cl.h / 2);
    ctx.restore();
  }

  // ── Phase 4 surge telegraph ──────────────────────────────────────────────────
  if (phase === 4 && wraith.surgePhase === 'snap') {
    const tx = wraith.surgeLockX + wraith.w / 2 - camera;
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.025);
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.35 * pulse;
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath(); ctx.moveTo(tx, 0); ctx.lineTo(tx, H); ctx.stroke();
    ctx.setLineDash([]);
    // Warning chevron above player
    ctx.fillStyle = '#ffff44';
    ctx.globalAlpha = 0.8 * pulse;
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▼ SURGE ▼', tx, player.y - 20);
    ctx.restore();
  }

  // ── Draw wraith body ─────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(wsx + wraith.w / 2 + shk, wraith.y + wraith.h / 2);

  // Outer smear aura
  const aGrad = ctx.createRadialGradient(0, 0, wraith.w * 0.2, 0, 0, wraith.w * 1.2);
  aGrad.addColorStop(0, glowColor + '55');
  aGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aGrad;
  ctx.beginPath(); ctx.ellipse(0, 0, wraith.w, wraith.h * 1.1, 0, 0, Math.PI * 2); ctx.fill();

  // Tentacles (phase 3)
  if (phase >= 3) {
    for (const tent of wraith.tentacles) {
      ctx.save();
      ctx.strokeStyle = accentColor;
      ctx.lineWidth = 5;
      ctx.globalAlpha = 0.85;
      const segments = 6;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      for (let s = 1; s <= segments; s++) {
        const frac = s / segments;
        const wobble = Math.sin(tent.angle * 2 + s) * 10 * frac;
        ctx.lineTo(
          Math.cos(tent.angle) * tent.length * frac + wobble * Math.sin(tent.angle),
          Math.sin(tent.angle) * tent.length * frac + wobble * Math.cos(tent.angle)
        );
      }
      ctx.stroke();
      // Tip glow
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = glowColor;
      ctx.beginPath();
      ctx.arc(Math.cos(tent.angle) * tent.length, Math.sin(tent.angle) * tent.length, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Body
  const hitFlashing = wraith.hitFlash > 0 && Math.floor(wraith.hitFlash / 3) % 2 === 0;
  ctx.globalAlpha = 1;
  ctx.fillStyle = hitFlashing ? '#ffffff' : bodyColor;
  ctx.beginPath(); ctx.ellipse(0, 0, wraith.w / 2, wraith.h / 2, 0, 0, Math.PI * 2); ctx.fill();

  // Phase fractures — cracks that grow with damage
  const crackCount = wraith.phase * 3;
  ctx.strokeStyle = glowColor; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6;
  for (let i = 0; i < crackCount; i++) {
    const a = (i / crackCount) * Math.PI * 2 + t * 0.1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 8, Math.sin(a) * 8);
    ctx.lineTo(Math.cos(a) * (wraith.w * 0.45), Math.sin(a) * (wraith.h * 0.44));
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Eyes — four eyes, no face, just horror
  const epGlow = 0.5 + 0.5 * Math.abs(Math.sin(wraith.eyePulse * 2.5));
  ctx.globalAlpha = epGlow;
  ctx.fillStyle = glowColor;
  for (const [ex, ey, er] of [[-16,-12,8],[16,-12,8],[-6,8,5],[6,8,5]]) {
    ctx.beginPath(); ctx.ellipse(ex, ey, er, er * 0.7, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = '#000'; ctx.globalAlpha = 1;
  for (const [ex, ey, er] of [[-16,-12,4],[16,-12,4],[-6,8,2.5],[6,8,2.5]]) {
    ctx.beginPath(); ctx.ellipse(ex + wraith.dir * 2, ey, er, er, 0, 0, Math.PI * 2); ctx.fill();
  }

  // HP bar
  const barW = wraith.w * 2, barH = 8;
  const barX = -barW / 2, barY = -wraith.h / 2 - 22;
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#110000'; ctx.fillRect(barX, barY, barW, barH);
  const hpR = wraith.hp / wraith.maxHp;
  ctx.fillStyle = phase === 1 ? '#6644ff' : phase === 2 ? '#ff3300' : '#ffaa00';
  ctx.fillRect(barX, barY, barW * hpR, barH);
  ctx.strokeStyle = '#ffffff33'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('ABYSSAL WRAITH', 0, barY - 3);

  ctx.restore();

  if (player.homingTarget === wraith || wraith.lockFlash > 0) drawLockOn(wraith);
}

// ── Warden functions ──────────────────────────────────────────────────────────
function damageWarden(dmg) {
  if (warden.dead || warden.hitFlash > 0 || warden.invulTimer > 0) return false;
  warden.hp -= dmg;
  warden.hitFlash = 20;
  warden.shakeX = 8;
  score += 500; updateHUD();
  if (warden.hp <= 0) {
    warden.hp = 0;
    warden.dead = true; warden.deadTimer = 200;
    warden.state = 'dead';
    spawnExplosion(warden.x + warden.w / 2, warden.y + warden.h / 2, true);
    comboCount += 8; comboTimer = 200;
    score += 8000; updateHUD();
    return true;
  }
  const newPhase = warden.hp > warden.maxHp * 0.5 ? 1 : 2;
  if (newPhase !== warden.phase) {
    warden.invulTimer = 80; warden.phase = newPhase;
    warden.shockwaves = []; warden.rocks = [];
  }
  spawnExplosion(warden.x + warden.w / 2, warden.y + warden.h / 2, false);
  return false;
}

function updateWarden() {
  if (!warden.active) return;
  if (warden.dead) {
    warden.deadTimer--;
    if (warden.deadTimer <= 0) { won = true; player.wonSlide = true; score += 1000; updateHUD(); }
    return;
  }

  warden.eyePulse += 0.06;
  if (warden.hitFlash > 0) warden.hitFlash--;
  if (warden.shakeX > 0) warden.shakeX = Math.max(0, warden.shakeX - 1.5);
  if (warden.invulTimer > 0) warden.invulTimer--;

  const px = player.x + player.w / 2;
  const wx = warden.x + warden.w / 2;

  // Gravity
  if (!warden.onGround) {
    warden.vy += 0.5;
    if (warden.vy > 22) warden.vy = 22;
  }
  warden.y += warden.vy;
  if (warden.y + warden.h >= WARDEN_GROUND) {
    warden.y = WARDEN_GROUND - warden.h;
    const wasFalling = warden.vy > 8;
    warden.vy = 0; warden.onGround = true;
    if (wasFalling && warden.state === 'stomp') {
      const cx = warden.x + warden.w / 2;
      warden.shockwaves.push({ cx, dir:  1, r: 12, maxR: 500, life: 60, maxLife: 60 });
      warden.shockwaves.push({ cx, dir: -1, r: 12, maxR: 500, life: 60, maxLife: 60 });
      if (warden.phase === 2) {
        warden.shockwaves.push({ cx: cx + 80, dir:  1, r: 8, maxR: 380, life: 50, maxLife: 50 });
        warden.shockwaves.push({ cx: cx - 80, dir: -1, r: 8, maxR: 380, life: 50, maxLife: 50 });
      }
      warden.state = 'idle';
      warden.stateTimer = 70 + Math.floor(Math.random() * 40);
    }
  }
  warden.x += warden.vx;
  warden.x = Math.max(WARDEN_ARENA_X, Math.min(WARDEN_ARENA_R - warden.w, warden.x));

  // Shockwaves
  for (let i = warden.shockwaves.length - 1; i >= 0; i--) {
    const sw = warden.shockwaves[i];
    sw.r += 5 + warden.phase;
    sw.life--;
    if (sw.life <= 0 || sw.r > sw.maxR) { warden.shockwaves.splice(i, 1); continue; }
    const dist = Math.abs(px - sw.cx);
    if (Math.abs(dist - sw.r) < 16 && player.onGround && player.invincible === 0) {
      hurtPlayer(1); player.invincible = 60;
      player.vy = -10;
      if (hp <= 0) { killPlayer(); return; }
    }
  }

  // Rocks (phase 2 charge debris)
  for (let i = warden.rocks.length - 1; i >= 0; i--) {
    const rk = warden.rocks[i];
    if (rk.dead) { rk.deadTimer--; if (rk.deadTimer <= 0) warden.rocks.splice(i, 1); continue; }
    rk.vy += 0.4;
    rk.x += rk.vx; rk.y += rk.vy;
    if (rk.y + 12 >= WARDEN_GROUND) { rk.y = WARDEN_GROUND - 12; rk.vy = -rk.vy * 0.5; rk.vx *= 0.85; }
    rk.x = Math.max(WARDEN_ARENA_X, Math.min(WARDEN_ARENA_R - 12, rk.x));
    const pR = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectsOverlap({ x: rk.x - 10, y: rk.y - 10, w: 20, h: 20 }, pR)) {
      if (player.dashFrames > 0 || (player.homing && player.homingTarget === rk)) {
        rk.dead = true; rk.deadTimer = 20;
        if (player.homing) { player.homing = false; player.homingTarget = null; player.ballForm = true; player.vy = -9; player.homingUsed = false; }
        else { player.vx = -Math.sign(player.vx || 1) * 8; player.vy = -5; player.dashFrames = 0; }
      } else if (player.invincible === 0) {
        hurtPlayer(1); player.invincible = 60;
        player.vy = -8; player.vx = (player.x < rk.x ? -1 : 1) * 9;
        if (hp <= 0) { killPlayer(); return; }
      }
    }
  }

  // State machine
  warden.stateTimer--;
  warden.dir = px < wx ? -1 : 1;

  if (warden.state === 'idle') {
    if (warden.onGround) warden.vx += (warden.dir * (1.5 + warden.phase * 0.5) - warden.vx) * 0.08;
    if (warden.stateTimer <= 0) {
      warden.vx = 0;
      if (Math.random() < 0.5) {
        warden.state = 'stomp'; warden.stateTimer = 80;
        warden.onGround = false;
        const dx = px - wx;
        warden.vx = Math.sign(dx) * Math.min(Math.abs(dx) * 0.06, 8) * (1 + warden.phase * 0.3);
        warden.vy = -(13 + warden.phase * 2);
      } else {
        warden.state = 'charge_telegraph'; warden.stateTimer = 40;
      }
    }

  } else if (warden.state === 'charge_telegraph') {
    warden.vx = 0;
    if (warden.stateTimer <= 0) {
      warden.state = 'charge'; warden.stateTimer = 35 + Math.floor(Math.random() * 10);
      warden.vx = warden.dir * (14 + warden.phase * 3);
    }

  } else if (warden.state === 'charge') {
    if (warden.stateTimer <= 0 || !warden.onGround ||
        warden.x <= WARDEN_ARENA_X + 4 || warden.x >= WARDEN_ARENA_R - warden.w - 4) {
      if (warden.phase === 2) {
        for (let r = 0; r < 2; r++) {
          warden.rocks.push({
            x: warden.x + warden.w / 2 + (r === 0 ? -20 : 20),
            y: warden.y,
            vx: (r === 0 ? -3 : 3) * (0.8 + Math.random() * 0.4),
            vy: -8 - Math.random() * 4,
            dead: false, deadTimer: 0, flying: true, w: 20, h: 20,
          });
        }
      }
      warden.vx = 0; warden.state = 'idle';
      warden.stateTimer = 60 + Math.floor(Math.random() * 40);
    }

  } else if (warden.state === 'stomp') {
    if (warden.stateTimer <= 0 && !warden.onGround) {
      warden.y = WARDEN_GROUND - warden.h; warden.vy = 0; warden.onGround = true;
      warden.state = 'idle'; warden.stateTimer = 60;
    }
  }

  // Direct hit detection
  const wRect = { x: warden.x + 6, y: warden.y + 6, w: warden.w - 12, h: warden.h - 12 };
  const pRect2 = { x: player.x, y: player.y, w: player.w, h: player.h };
  if (rectsOverlap(wRect, pRect2)) {
    if (player.dashFrames > 0 && warden.hitFlash === 0) {
      damageWarden(1);
      player.vx = -Math.sign(player.vx) * 10; player.vy = -7;
      player.dashFrames = 0; player.onGround = false;
    } else if (player.homing && player.homingTarget === warden) {
      damageWarden(1);
      player.homing = false; player.homingTarget = null; player.ballForm = true;
      player.vy = Math.min(player.vy, -CFG.jump1 * 0.7);
      player.vx = player.dir * CFG.moveSpeed * 1.5;
      player.homingUsed = false; comboCount++; comboTimer = 120;
    } else if (!player.homing && !player.ballForm && !player.dashFrames && player.invincible === 0) {
      hurtPlayer(1); player.invincible = 80;
      player.vy = -9; player.vx = (player.x < wx ? -1 : 1) * 11;
      if (hp <= 0) { killPlayer(); return; }
    }
  }
}

function drawWarden() {
  if (!warden.active) return;
  const wsx = warden.x - camera;
  if (wsx < -200 || wsx > W + 200) return;

  const phase = warden.phase;
  const shk = warden.shakeX > 0 ? Math.sin(performance.now() * 0.05) * warden.shakeX : 0;
  const accentColor = phase === 1 ? '#cc6600' : '#ff2200';
  const glowColor   = phase === 1 ? '#ff9900' : '#ff4400';

  // Shockwaves
  for (const sw of warden.shockwaves) {
    const fade = sw.life / sw.maxLife;
    ctx.save();
    ctx.globalAlpha = fade * 0.9;
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 5 * fade + 2;
    const gy2 = WARDEN_GROUND - 4;
    ctx.beginPath();
    if (sw.dir > 0) ctx.arc(sw.cx - camera, gy2, sw.r, Math.PI, 0);
    else            ctx.arc(sw.cx - camera, gy2, sw.r, 0, Math.PI);
    ctx.stroke();
    ctx.restore();
  }

  // Rocks
  for (const rk of warden.rocks) {
    if (rk.dead) continue;
    const rx = rk.x - camera;
    ctx.save();
    ctx.fillStyle = '#886644'; ctx.strokeStyle = accentColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(rx, rk.y, 10, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
    if (player.homingTarget === rk || rk.lockFlash > 0) drawLockOn(rk);
  }

  // Charge telegraph arrow
  if (warden.state === 'charge_telegraph') {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.03);
    ctx.save();
    ctx.globalAlpha = 0.75 * pulse;
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(warden.dir > 0 ? '►' : '◄', wsx + warden.w / 2 + warden.dir * 55, warden.y + warden.h / 2);
    ctx.restore();
  }

  // Body
  ctx.save();
  ctx.translate(wsx + warden.w / 2 + shk, warden.y + warden.h / 2);

  const aGrad = ctx.createRadialGradient(0, 0, warden.w * 0.15, 0, 0, warden.w * 0.9);
  aGrad.addColorStop(0, glowColor + '55');
  aGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aGrad;
  ctx.beginPath(); ctx.ellipse(0, 0, warden.w * 0.9, warden.h * 0.9, 0, 0, Math.PI * 2); ctx.fill();

  const flash = warden.hitFlash > 0 && Math.floor(warden.hitFlash / 3) % 2 === 0;
  ctx.fillStyle = flash ? '#ffffff' : (phase === 1 ? '#2a1a0a' : '#3a0a0a');
  const hw = warden.w / 2 - 2, hh = warden.h / 2 - 2;
  ctx.beginPath();
  ctx.moveTo(-hw + 10, -hh); ctx.lineTo(hw - 10, -hh);
  ctx.quadraticCurveTo(hw, -hh, hw, -hh + 10); ctx.lineTo(hw, hh - 10);
  ctx.quadraticCurveTo(hw, hh, hw - 10, hh); ctx.lineTo(-hw + 10, hh);
  ctx.quadraticCurveTo(-hw, hh, -hw, hh - 10); ctx.lineTo(-hw, -hh + 10);
  ctx.quadraticCurveTo(-hw, -hh, -hw + 10, -hh);
  ctx.closePath(); ctx.fill();

  if (!flash) {
    ctx.fillStyle = accentColor; ctx.globalAlpha = 0.7;
    ctx.fillRect(-hw + 6, -hh + 6, (hw - 6) * 2, 10);
    ctx.fillRect(-hw + 6,  hh - 16, (hw - 6) * 2, 10);
    ctx.globalAlpha = 1;
  }

  const ep = 0.6 + 0.4 * Math.abs(Math.sin(warden.eyePulse * 2));
  ctx.globalAlpha = ep; ctx.fillStyle = glowColor;
  ctx.beginPath(); ctx.ellipse(-16, -10, 10, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 16, -10, 10, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.globalAlpha = 1;
  ctx.beginPath(); ctx.ellipse(-16 + warden.dir * 3, -10, 5, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 16 + warden.dir * 3, -10, 5, 5, 0, 0, Math.PI * 2); ctx.fill();

  if (warden.state === 'charge' || warden.state === 'charge_telegraph') {
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.moveTo(-26, -20); ctx.lineTo(-6, -16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 26, -20); ctx.lineTo(  6, -16); ctx.stroke();
  }

  const barW = warden.w * 2, barH = 8, barX = -barW / 2, barY = -warden.h / 2 - 22;
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#220000'; ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = phase === 1 ? '#ff9900' : '#ff2200';
  ctx.fillRect(barX, barY, barW * (warden.hp / warden.maxHp), barH);
  ctx.strokeStyle = '#ffffff33'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('THE WARDEN', 0, barY - 3);

  ctx.restore();
  if (player.homingTarget === warden || warden.lockFlash > 0) drawLockOn(warden);
}

function nearestLiveGoomba(range = HOMING_RANGE) {
  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  let best = null, bestDist = Infinity;
  // Include boss orbs and boss itself as homing targets
  const candidates = [...goombas, ...flyers];
  if (boss.active && !boss.dead) {
    const allOrbsDead = boss.orbs.every(o => o.dead);
    if (boss.orbs.length > 0) {
      for (const o of boss.orbs) { if (!o.dead) candidates.push(o); }
    }
    if (allOrbsDead) candidates.push(boss);
  }
  if (wraith.active && !wraith.dead) {
    const liveClones = wraith.clones.filter(c => !c.dead);
    if (liveClones.length > 0) {
      const minOrder = Math.min(...liveClones.map(c => c.orderNum));
      for (const c of liveClones) { if (c.orderNum === minOrder) candidates.push(c); }
    } else {
      candidates.push(wraith);
    }
  }
  if (warden.active && !warden.dead) {
    for (const rk of warden.rocks) { if (!rk.dead) candidates.push(rk); }
    candidates.push(warden);
  }
  for (const g of candidates) {
    if (g.dead) continue;
    const gx = g.x + g.w / 2, gy = g.y + g.h / 2;
    const dist = Math.hypot(px - gx, py - gy);
    if (dist < range && dist < bestDist) { best = g; bestDist = dist; }
  }
  return best;
}

function update(dt) {
  if (won && !player.wonSlide) return;
  if (dead) return;

  player.w = CFG.axoSize;
  player.h = CFG.axoSize;
  if (player.invincible > 0) player.invincible--;
  if (player.ballExitFlash > 0) player.ballExitFlash--;

  const now = performance.now();
  const goLeft  = keys[KEYS.left]  || false;
  const goRight = keys[KEYS.right] || false;
  const jumpKey = keys[KEYS.jump] || false;
  const upKey   = keys[KEYS.up] || false;
  const jumpJustPressed = jumpKey && !prevJumpKey;
  prevJumpKey = jumpKey;
  prevUpKey   = upKey;

  const eKey = keys[KEYS.dash] || false;
  const eJustPressed = eKey && !prevEKey;
  prevEKey = eKey;

  if (player.wonSlide) {
    player.vy = 2.5; player.vx = 0;
    player.y += player.vy;
    if (player.y + player.h >= groundY * TILE) player.y = groundY * TILE - player.h;
    camera += (Math.min(player.x - W / 3, LEVEL_W_TILES * TILE - W) - camera) * CAM_EASE;
    return;
  }

  // Space/jump while airborne — homing attack if enemy nearby
  // Frenzy: 3 homes per jump freely; normal: 3 total but need kill to re-enable per use
  const frenzyActive = player.frenzyTimer > 0;
  const homingAllowed = player.homingCount < 3 && (frenzyActive || !player.homingUsed);
  if (jumpJustPressed && !player.onGround && !player.homing && homingAllowed) {
    const target = nearestLiveGoomba(frenzyActive ? HOMING_RANGE : 130);
    if (target) {
      player.homing = true;
      player.homingTarget = target;
      player.homingUsed = !frenzyActive; // frenzy never blocks re-activation
      player.homingCount++;
      target.lockFlash = 10;
    }
  }

  // F — directional dash, tracked per direction
  if (eJustPressed && !player.homing) {
    const goingUp = keys[KEYS.up] || false;
    const horizDir = goLeft ? -1 : goRight ? 1 : player.dir;
    const wantH = goLeft || goRight || (!goingUp);
    const wantUp = goingUp;
    const frenzy = player.frenzyTimer > 0;
    const canUp = wantUp && !player.dashUsedUp;
    const canH  = wantH  && !player.dashUsedH;

    if (wantUp && wantH && (canUp || canH)) {
      // diagonal — only allowed if both directions still available
      if (canUp && canH) {
        const spd = frenzy ? 1 : 0.5;
        const diagH = CFG.dashH * 0.707 * spd;
        const diagV = CFG.dashV * 0.707 * spd;
        player.vx = horizDir * diagH;
        player.vy = -diagV;
        player.dashUsedUp = true;
        player.dashUsedH  = true;
        player.dashFrames = frenzy ? CFG.dashLenFrenzy : CFG.dashLen;
        player.ballForm = true;
        player.spinning = false;
      }
    } else if (wantUp && canUp) {
      player.vx = 0;
      player.vy = -(CFG.dashV * (frenzy ? 1 : 0.5));
      player.dashUsedUp = true;
      player.dashFrames = frenzy ? CFG.dashLenFrenzy : CFG.dashLen;
      player.dashingUp = true;
      player.ballForm = true;
      player.spinning = false;
    } else if (canH) {
      player.vx = horizDir * CFG.dashH * (frenzy ? 1 : 0.5);
      player.vy = 0;
      player.dashUsedH = true;
      player.dashFrames = frenzy ? CFG.dashLenFrenzy : CFG.dashLen;
      player.ballForm = true;
      player.spinning = false;
    }
    if (player.dashFrames > 0) playSound('dash', 0.45);
  }

  // Tick dash frames and spawn afterimage trail
  if (player.dashFrames > 0) {
    player.dashFrames--;
    if (player.dashFrames === 0) { player.dashingUp = false; if (!player.homing) { if (player.ballForm) player.ballExitFlash = BALL_EXIT_FLASH; player.ballForm = false; } }
    // dense afterimage trail — two per frame
    spawnDashTrail(player.x + player.w / 2, player.y + player.h / 2);
    spawnDashTrail(player.x + player.w / 2, player.y + player.h / 2);
  }

  // Drive homing movement
  if (player.homing && player.homingTarget) {
    const tg = player.homingTarget;
    if (tg.dead) {
      player.homing = false; player.homingTarget = null; player.ballForm = true;
    } else {
      const tx = tg.x + tg.w / 2, ty = tg.y + tg.h / 2;
      const px = player.x + player.w / 2, py = player.y + player.h / 2;
      const dx = tx - px, dy = ty - py;
      const dist = Math.hypot(dx, dy);
      if (dist < 12) {
        const killed = damageEnemy(tg, 1);
        if (killed) { comboCount++; comboTimer = 120; player.homingUsed = false; player.homingCount = Math.max(0, player.homingCount - 1); }
        player.homing = false; player.homingTarget = null;
        player.ballForm = true;
        player.vy = Math.min(player.vy, -CFG.jump1 * 0.5);
        player.vx = player.dir * CFG.moveSpeed * 1.5;
        player.spinning = false;
      } else {
        player.vx = (dx / dist) * HOMING_SPEED;
        player.vy = (dy / dist) * HOMING_SPEED;
        if (player.vx > 0) player.dir = 1;
        else if (player.vx < 0) player.dir = -1;
        spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
      }
    }
  }

  // Normal movement (not homing, not dashing)
  if (!player.homing && player.dashFrames <= 0) {
    if (goRight) { player.vx = CFG.moveSpeed; player.dir = 1; }
    else if (goLeft) { player.vx = -CFG.moveSpeed; player.dir = -1; }
    else player.vx *= 0.75;
  }

  // Jump from ground only
  if (jumpJustPressed && player.onGround) {
    player.vy = -CFG.jump1;
    player.onGround = false;
    player.homingUsed = false;
    player.homingCount = 0;
    playSound('jump', 0.5);
  }

  // Spin during homing or after a dash
  if (player.spinning || player.homing || player.ballForm) {
    player.spinAngle += player.homing ? 28 : 18;
    if (Math.random() < 0.5) spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
  }

  // Gravity (suppressed during homing and active dash frames)
  if (!player.homing && player.dashFrames <= 0) {
    const g = player.onGround ? CFG.gravity : CFG.gravity1;
    player.vy += g;
    if (player.vy > 20) player.vy = 20;
  }

  // Move X
  player.x += player.vx;
  player.x = Math.max(0, player.x);

  // Ceiling — invisible wall at top of world
  if (player.y < 0) { player.y = 0; if (player.vy < 0) player.vy = 0; }

  // Collide X
  const nearX = getSolidsNear(player.x, player.y, player.w, player.h);
  for (const s of nearX) {
    if (rectsOverlap({ x: player.x, y: player.y + 2, w: player.w, h: player.h - 4 }, s)) {
      if (player.vx > 0) player.x = s.x - player.w;
      else if (player.vx < 0) player.x = s.x + s.w;
      player.vx = 0;
      if (player.homing) { player.homing = false; player.homingTarget = null; player.spinning = false; }
    }
  }

  // Move Y
  const wasOnGround = player.onGround;
  player.onGround = false;
  player.y += player.vy;

  const nearY = getSolidsNear(player.x, player.y, player.w, player.h);
  for (const s of nearY) {
    if (rectsOverlap({ x: player.x + 2, y: player.y, w: player.w - 4, h: player.h }, s)) {
      if (player.vy > 0) {
        player.y = s.y - player.h;
        player.vy = 0;
        if (!wasOnGround) {
          player.lastLandTime = now;
          spawnDust(player.x + player.w / 2, player.y + player.h);
          playSound('land', 0.3);
          player.spinning = false;
          if (player.ballForm) player.ballExitFlash = BALL_EXIT_FLASH;
          player.ballForm = false;
          player.dashingUp = false;
          player.homing = false; player.homingTarget = null;
          player.dashFrames = 0;
          comboCount = 0; comboTimer = 0;
        }
        player.onGround = true;
        player.homingUsed = false; player.homingCount = 0;
        player.dashUsedUp = false; player.dashUsedH = false;
      } else if (player.vy < 0) {
        player.y = s.y + s.h;
        player.vy = 1;
        hitBlock(s);
        if (player.homing) { player.homing = false; player.homingTarget = null; player.spinning = false; }
      }
    }
  }

  // Pit death — frenzy wraps to ceiling instead
  if (player.y > H + 200) {
    if (player.frenzyTimer > 0) {
      player.y = -player.h;
      player.vy = Math.abs(player.vy) * 0.5;
    } else {
      killPlayer(); return;
    }
  }

  // Coins
  for (const coin of coins) {
    if (coin.collected) continue;
    coin.bobTimer += 0.05;
    if (rectsOverlap({ x: coin.x + 4, y: coin.y + 4, w: TILE - 8, h: TILE - 8 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
      coin.collected = true; coinCount++; score += 200; updateHUD(); playSound('coin', 0.5);
    }
  }

  // Frenzy activation (R or Q)
  if (frenzyKeyPressed) {
    frenzyKeyPressed = false;
    if (player.frenzyKills >= 7 && player.frenzyTimer <= 0) {
      player.frenzyKills = 0;
      player.frenzyTimer = 900;
      player.homingUsed = false;
      spawnExplosion(player.x + player.w / 2, player.y + player.h / 2, true);
    }
  }

  // Frenzy tick + trail
  if (player.frenzyTimer > 0) {
    player.frenzyTimer--;
    // Spawn cyan trail every frame
    trailParticles.push({
      x: player.x + player.w / 2 + (Math.random() - 0.5) * 10,
      y: player.y + player.h / 2 + (Math.random() - 0.5) * 10,
      r: Math.random() * 7 + 4,
      life: 18 + Math.floor(Math.random() * 8),
      maxLife: 26,
      hue: 185 + Math.random() * 30,
      bright: true,
      frenzyTrail: true,
    });
  }

  // Heart pickups
  const groundFloor = (groundY - 1) * TILE;
  for (let i = heartPickups.length - 1; i >= 0; i--) {
    const h = heartPickups[i];
    if (h.collected) { heartPickups.splice(i, 1); continue; }
    h.vy += 0.45;
    if (h.vy > 18) h.vy = 18;
    h.x += h.vx;
    h.y += h.vy;
    h.vx *= 0.96;
    if (h.y + 20 >= groundFloor) { h.y = groundFloor - 20; h.vy = 0; h.vx = 0; }
    h.bobTimer += 0.06;
    if (rectsOverlap({ x: h.x, y: h.y, w: 20, h: 20 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
      h.collected = true;
      hp = Math.min(MAX_HP, hp + 1); updateHPBar();
    }
  }

  // Ground enemies + flyers — unified update
  const allEnemies = [...goombas, ...flyers];
  for (const g of allEnemies) {
    if (g.dead) { g.deadTimer--; if (g.lockFlash) g.lockFlash--; continue; }
    if (g.lockFlash) g.lockFlash--;
    if (g.shockStun > 0) { g.shockStun--; continue; } // frozen during shockwave
    g.x += g.vx;
    if (g.x <= g.pl || g.x + g.w >= g.pr) g.vx *= -1;
    g.frame += 0.08;
    if (g.flying) {
      g.wobble += 0.04;
      g.y = g.baseY + Math.sin(g.wobble) * 18;
    }

    // Shoot at player if within range and cooldown elapsed
    if (!g.shootCooldown) g.shootCooldown = 180 + Math.floor(Math.random() * 120);
    g.shootCooldown--;
    if (g.shootCooldown <= 0) {
      const dx = (player.x + player.w / 2) - (g.x + g.w / 2);
      const dy = (player.y + player.h / 2) - (g.y + g.h / 2);
      const dist = Math.hypot(dx, dy);
      if (dist < 380) {
        if (g.flying) {
          // Three projectiles: aimed + two spread
          const spd = 4.5;
          const ang = Math.atan2(dy, dx);
          for (const spread of [-0.25, 0, 0.25]) {
            projectiles.push({ x: g.x + g.w/2, y: g.y + g.h/2,
              vx: Math.cos(ang + spread) * spd, vy: Math.sin(ang + spread) * spd,
              life: 130, flying: true });
          }
        } else {
          const spd = 2.2;
          projectiles.push({ x: g.x + g.w/2, y: g.y + g.h/2, vx: (dx/dist)*spd, vy: (dy/dist)*spd, life: 160, flying: false });
        }
      }
      g.shootCooldown = g.flying
        ? 180 + Math.floor(Math.random() * 120)
        : 240 + Math.floor(Math.random() * 160);
    }

    if (g.hitFlash > 0) g.hitFlash--;
    const gr = { x: g.x + 2, y: g.y + 2, w: g.w - 4, h: g.h - 4 };
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectsOverlap(gr, pr)) {
      if (player.dashFrames > 0 && !g.hitFlash) {
        damageEnemy(g, g.hp); // dash insta-kills
        // Bounce player back opposite dash direction
        player.vx = -Math.sign(player.vx) * 8;
        player.vy = -6;
        player.dashFrames = 0;
        player.onGround = false;
      } else if (player.spinning || (!g.flying && player.vy > 0 && player.y + player.h < g.y + g.h / 2 + 10)) {
        damageEnemy(g, 1); // stomp deals 1 hit like everything else
        player.vy = Math.min(player.vy, -6);
      } else if (!player.homing && !player.ballForm && !player.dashFrames && player.invincible === 0) {
        hurtPlayer(1); player.invincible = 80;
        playSound('hurt', 0.6);
        if (hp <= 0) { killPlayer(); return; }
      }
    }
  }

  // Projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    if (rectsOverlap({ x: p.x - 5, y: p.y - 5, w: 10, h: 10 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
      projectiles.splice(i, 1);
      if (player.invincible === 0) {
        hp--;
        updateHPBar();
        // Knockback away from projectile direction
        player.vx = (p.vx > 0 ? 1 : -1) * 9;
        player.vy = -7;
        player.onGround = false;
        player.invincible = 80;
        if (hp <= 0) { killPlayer(); return; }
      }
    }
  }


  // Boss update
  updateBoss();
  updateWraith();
  updateWarden();

  // Flag (skip on boss level — win is triggered by boss death)
  if (!LEVELS[currentLevel].isBossLevel) {
    if (player.x + player.w > FLAG_X * TILE && !won) {
      won = true; player.wonSlide = true;
      player.x = FLAG_X * TILE - player.w + 6; player.vx = 0;
      score += 1000; updateHUD();
    }
  }

  // Camera X — keep player horizontally centered at all zoom levels
  const targetCam = player.x + player.w / 2 - W / 2;
  camera += (Math.min(Math.max(targetCam, 0), LEVEL_W_TILES * TILE - W) - camera) * CAM_EASE;

  // Camera Y — keep player vertically centered at all zoom levels
  const targetCamY = player.y + player.h / 2 - H / 2;
  cameraY += (Math.min(Math.max(targetCamY, groundY * TILE - H), 0) - cameraY) * CAM_EASE;

  if (comboTimer > 0) comboTimer--;
  updateHUD();
}

function hitBlock(s) {
  if (!s.key || blockHit[s.key]) return;
  blockHit[s.key] = true;
  if (s.type === 'qblock') { score += 200; }
  else if (s.type === 'brick') score += 50;
  else if (s.type === 'hblock') { hp = Math.min(MAX_HP, hp + 1); updateHPBar(); }
  updateHUD();
}

function hurtPlayer(dmg = 1) {
  if (player.frenzyTimer > 0) return; // infinite health during frenzy
  hp -= dmg; updateHPBar();
}

function killPlayer() {
  if (dead) return;
  dead = true; player.dead = true; player.vy = -12; player.vx = 0;
  setTimeout(() => {
    document.getElementById('go-score').textContent = 'Score: ' + String(score).padStart(6, '0');
    document.getElementById('gameover').classList.add('show');
  }, 1200);
}

document.getElementById('go-restart').addEventListener('click', () => location.reload());
document.addEventListener('keydown', e => {
  if ((e.code === 'KeyR' || e.code === 'Enter') && dead) { location.reload(); return; }
});

let frenzyKeyPressed = false;
document.addEventListener('keydown', e => {
